<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        const authScreen = document.getElementById('auth-screen');
        const appInterface = document.getElementById('app-interface');
        if (user) {
          authScreen.style.display = 'none';
          appInterface.style.display = 'block';
          window.resetTimeInputs();
          window.refreshCurrentPage(); 
        } else {
          authScreen.style.display = 'flex';
          appInterface.style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider).catch(e => console.error("Login Error: " + e.message));
      window.logout = () => signOut(auth).then(() => location.reload());
    </script>
    
    <style>
        :root { --bg: #f4f9f4; --card: #ffffff; --text: #2d412d; --accent: #81c784; --timer-bg: #e8f5e9; --active-tile-border: #4caf50; }
        body.night { --bg: #000000; --card: #120000; --text: #cc0000; --accent: #880000; --timer-bg: #210000; --active-tile-border: #ff1744; }
        
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 80px; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app-interface { display: none; width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 20px; }
        .logo-text { font-size: 24px; font-weight: bold; color: var(--accent); }
        
        #tab-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .tab-tile { background: var(--card); border-radius: 16px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .tab-tile.active { border-color: var(--active-tile-border); }
        .tile-emoji { font-size: 24px; margin-bottom: 4px; }
        .tile-label { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .timer-banner { background: var(--timer-bg); padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 14px; border: 1px solid var(--accent); }

        input { background: var(--card); color: var(--text); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .side-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--accent); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; }
        .side-btn.active { background: var(--accent); color: white; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; border-top: 3px solid var(--accent); font-size: 12px; }
        
        #fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(0,0,0,0.1); z-index: 100; }
        .fixed-action { display: flex; align-items: center; color: var(--text); font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo-text">Eco Family Flow</div>
    <button onclick="window.login()" class="save-btn" style="width: auto; padding: 15px 30px; margin-top: 15px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <header>
        <div class="logo-text">Eco Family Flow</div>
    </header>

    <section id="tab-grid">
        <div id="tile-milk" class="tab-tile active" onclick="window.showPage('milk', this)">
            <span class="tile-emoji">🤱</span>
            <span class="tile-label" data-units="Milk (ML)">Milk (ML)</span>
        </div>
        <div id="tile-formula" class="tab-tile" onclick="window.showPage('formula', this)">
            <span class="tile-emoji">🥛</span>
            <span class="tile-label" data-units="Formula (ML)">Formula (ML)</span>
        </div>
        <div id="tile-combined" class="tab-tile" onclick="window.showPage('combined', this)">
            <span class="tile-emoji">📈</span>
            <span class="tile-label" data-units="Combined (ML)">Combined (ML)</span>
        </div>
        <div id="tile-skin" class="tab-tile" onclick="window.showPage('skin-to-skin', this)">
            <span class="tile-emoji">🫂</span>
            <span class="tile-label">Skin to Skin</span>
        </div>
        <div class="tab-tile" onclick="window.switchUnits()">
            <span id="switcher-flag" class="tile-emoji">🇬🇧</span>
            <span id="switcher-label" class="tile-label">British</span>
        </div>
    </section>

    <main>
        <div id="milk" class="page active">
            <div id="milk-timer" class="timer-banner">Calculating last feed...</div>
            <div class="card">
                <input type="datetime-local" id="feedTime">
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <button id="mode-pump" class="side-btn active" onclick="setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="side-btn" onclick="setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="sideL" class="side-btn active" onclick="setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="setSide('Right')">Right</button>
                    <button id="sideB" class="side-btn" onclick="setSide('Both')">Both</button>
                </div>
                <input type="number" id="milkAmt" placeholder="Amount (ml)">
                <button class="save-btn" id="saveBtn" onclick="submitLog('Milk')">Confirm & Save</button>
            </div>
            <div id="milk-stats-area" class="stat-grid"></div>
            <div class="card"><div style="height: 220px;"><canvas id="milkChart"></canvas></div></div>
        </div>

        <div id="formula" class="page">
            <div id="formula-timer" class="timer-banner">Calculating last bottle...</div>
            <div class="card">
                <input type="datetime-local" id="formulaTime">
                <input type="number" id="formulaAmt" placeholder="Bottle (ml)">
                <button class="save-btn" id="formulaSaveBtn" onclick="submitLog('Formula')">Save Bottle</button>
            </div>
            <div id="formula-stats-area" class="stat-grid"></div>
            <div class="card"><div style="height: 220px;"><canvas id="formulaChart"></canvas></div></div>
        </div>

        <div id="combined" class="page">
            <div id="combined-stats-area" class="stat-grid"></div>
            <div class="card">
                <div style="font-size:14px; margin-bottom:10px;">Daily Combined Volume</div>
                <div style="height: 250px;"><canvas id="combinedChart"></canvas></div>
            </div>
        </div>

        <div id="skin-to-skin" class="page">
            <div class="card">
                <label style="font-size:12px;">Start Time</label>
                <input type="datetime-local" id="skinStart">
                <label style="font-size:12px;">End Time</label>
                <input type="datetime-local" id="skinEnd">
                <button class="save-btn" id="skinSaveBtn" onclick="submitSkinLog()">Log Session</button>
            </div>
            <div id="skin-stats-area" class="stat-grid"></div>
            <div class="card"><div style="height: 220px;"><canvas id="skinChart"></canvas></div></div>
        </div>
    </main>
</div>

<footer id="fixed-bottom">
    <div class="fixed-action" onclick="window.toggleNight()">
        <span id="night-icon" style="margin-right:5px;">🌙</span> Night Mode
    </div>
    <div class="fixed-action" onclick="window.logout()">
        <span style="margin-right:5px;">🏃</span> Logout
    </div>
</footer>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zj15xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    const ML_TO_OZ = 0.033814;
    const OZ_TO_ML = 29.5735;
    window.currentUnits = 'UK'; 
    window.currentSide = 'Left';
    window.currentMode = 'Pump';
    window.activeTab = 'milk';
    
    let charts = {};

    window.setSide = (s) => { 
        window.currentSide = s; 
        document.querySelectorAll('#sideL, #sideR, #sideB').forEach(b => b.classList.toggle('active', b.id === `side${s.charAt(0)}`)); 
    };

    window.setMilkMode = (m) => { 
        window.currentMode = m; 
        document.querySelectorAll('#mode-pump, #mode-feed').forEach(b => b.classList.toggle('active', b.id === `mode-${m.toLowerCase()}`)); 
    };

    window.resetTimeInputs = () => { 
        const now = new Date(); 
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); 
        const timeStr = now.toISOString().slice(0, 16); 
        document.querySelectorAll('#feedTime, #formulaTime, #skinStart, #skinEnd').forEach(i => i.value = timeStr); 
    };

    window.toggleNight = () => {
        document.body.classList.toggle('night');
        document.getElementById('night-icon').innerText = document.body.classList.contains('night') ? '☀️' : '🌙';
    };

    window.switchUnits = () => {
        window.currentUnits = (window.currentUnits === 'UK') ? 'US' : 'UK';
        const isUS = (window.currentUnits === 'US');
        document.getElementById('switcher-flag').innerText = isUS ? '🇺🇸' : '🇬🇧';
        document.getElementById('switcher-label').innerText = isUS ? 'American' : 'British';
        document.getElementById('milkAmt').placeholder = isUS ? "Amount (oz)" : "Amount (ml)";
        document.getElementById('formulaAmt').placeholder = isUS ? "Bottle (oz)" : "Bottle (ml)";
        document.querySelectorAll('.tile-label[data-units]').forEach(l => {
            l.innerText = l.getAttribute('data-units').replace('(ML)', isUS ? '(OZ)' : '(ML)');
        });
        window.refreshCurrentPage();
    };

    window.showPage = (id, btn) => {
        window.activeTab = id;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-tile').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        window.refreshCurrentPage();
    };

    window.submitLog = async (cat) => {
        const email = window.auth?.currentUser?.email;
        const amtInput = document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt');
        const timeInput = document.getElementById(cat === 'Milk' ? 'feedTime' : 'formulaTime');
        const btn = document.getElementById(cat === 'Milk' ? 'saveBtn' : 'formulaSaveBtn');
        
        if(!amtInput.value || !email) return;
        btn.innerText = "⌛ Saving...";

        let mlValue = parseFloat(amtInput.value);
        if(window.currentUnits === 'US') mlValue = (mlValue * OZ_TO_ML).toFixed(0);
        
        const payload = { 
            timestamp: timeInput.value, category: cat, value: mlValue, 
            detail1: cat === 'Milk' ? `${window.currentMode} (${window.currentSide})` : 'Bottle', 
            user: email 
        };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            btn.innerText = "✅ Saved!";
            amtInput.value = '';
            setTimeout(() => { 
                btn.innerText = cat === 'Milk' ? "Confirm & Save" : "Save Bottle";
                window.refreshCurrentPage();
            }, 1500);
        } catch (e) { btn.innerText = "❌ Error"; }
    };

    window.submitSkinLog = async () => {
        const email = window.auth?.currentUser?.email;
        const start = new Date(document.getElementById('skinStart').value);
        const end = new Date(document.getElementById('skinEnd').value);
        const duration = Math.round((end - start) / 1000 / 60);
        const btn = document.getElementById('skinSaveBtn');

        if (duration <= 0 || !email) { btn.innerText = "Check Times!"; return; }
        btn.innerText = "⌛ Saving...";

        const payload = { timestamp: new Date().toISOString(), category: 'SkinToSkin', value: duration, detail1: 'Session', user: email };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            btn.innerText = "✅ Saved!";
            setTimeout(() => { btn.innerText = "Log Session"; window.refreshCurrentPage(); }, 1500);
        } catch (e) { btn.innerText = "❌ Error"; }
    };

    window.refreshCurrentPage = async () => {
        const email = window.auth?.currentUser?.email;
        if(!email) return;

        try {
            const res = await fetch(GOOGLE_URL);
            const allData = await res.json();
            const userData = allData.filter(r => r.user === email);

            if(window.activeTab === 'milk') processData(userData, 'Milk', 'milkChart', 'milk-stats-area', '#81c784');
            if(window.activeTab === 'formula') processData(userData, 'Formula', 'formulaChart', 'formula-stats-area', '#4caf50');
            if(window.activeTab === 'combined') processCombined(userData);
            if(window.activeTab === 'skin-to-skin') processData(userData, 'SkinToSkin', 'skinChart', 'skin-stats-area', '#2196f3', 'mins');
        } catch (e) { console.error("Data Load Error", e); }
    };

    function processData(data, cat, chartId, statsId, color, unitOverride) {
        const filtered = data.filter(r => r.category === cat).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        const daily = {};
        let totalToday = 0;
        const todayStr = new Date().toLocaleDateString();

        filtered.forEach(r => {
            const d = new Date(r.timestamp).toLocaleDateString();
            const val = parseFloat(r.value);
            daily[d] = (daily[d] || 0) + val;
            if(d === todayStr) totalToday += val;
        });

        const labels = Object.keys(daily).slice(-7);
        const values = labels.map(l => window.currentUnits === 'US' && !unitOverride ? (daily[l] * ML_TO_OZ).toFixed(1) : daily[l]);
        
        // Calculate 7 Day Avg
        const sum = values.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
        const avg = (sum / (values.length || 1)).toFixed(1);
        const displayTotal = window.currentUnits === 'US' && !unitOverride ? (totalToday * ML_TO_OZ).toFixed(1) : totalToday;
        const unit = unitOverride || (window.currentUnits === 'US' ? 'oz' : 'ml');

        document.getElementById(statsId).innerHTML = `
            <div class="stat-card"><b>Today</b><br>${displayTotal} ${unit}</div>
            <div class="stat-card"><b>7D Average</b><br>${avg} ${unit}</div>
        `;

        renderChart(chartId, `${cat} (${unit})`, labels, values, color);
    }

    function processCombined(data) {
        const daily = {};
        data.filter(r => r.category === 'Milk' || r.category === 'Formula').forEach(r => {
            const d = new Date(r.timestamp).toLocaleDateString();
            daily[d] = (daily[d] || 0) + parseFloat(r.value);
        });

        const labels = Object.keys(daily).slice(-7);
        const values = labels.map(l => window.currentUnits === 'US' ? (daily[l] * ML_TO_OZ).toFixed(1) : daily[l]);
        
        const sum = values.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
        const avg = (sum / (values.length || 1)).toFixed(1);
        const unit = window.currentUnits === 'US' ? 'oz' : 'ml';

        document.getElementById('combined-stats-area').innerHTML = `
            <div class="stat-card"><b>Avg Daily Intake</b><br>${avg} ${unit}</div>
            <div class="stat-card"><b>Days Tracked</b><br>${labels.length}</div>
        `;

        renderChart('combinedChart', `Total Intake (${unit})`, labels, values, '#ff9800');
    }

    function renderChart(id, label, labels, data, color) {
        const ctx = document.getElementById(id).getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: label, data: data, borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
