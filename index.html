<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Family Flow</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc",
        measurementId: "G-DDCPL98RXR"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      window.auth = auth;
      window.login = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
      window.logout = () => signOut(auth);

      onAuthStateChanged(auth, (user) => {
        const authScreen = document.getElementById('auth-screen');
        const appInterface = document.getElementById('app-interface');
        if (user) {
          authScreen.style.display = 'none';
          appInterface.style.display = 'flex';
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          const timeInput = document.getElementById('feedTime');
          if(timeInput) timeInput.value = now.toISOString().slice(0, 16);
        } else {
          authScreen.style.display = 'flex';
          appInterface.style.display = 'none';
        }
      });
    </script>
    
    <style>
        :root {
            --bg: #f4f9f4; --sidebar: #dceddc; --card: #ffffff;
            --text: #2d412d; --accent: #81c784; --night-bg: #000;
            --night-text: #ff0000; --night-card: #1a0000;
        }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; }
        body.night { background: var(--night-bg); color: var(--night-text); }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #app-interface { display: none; width: 100%; height: 100%; }
        nav { width: 75px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #c8d6c8; }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 25px; cursor: pointer; padding: 12px; border-radius: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .save-btn { background: #66bb6a; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .side-btn, .type-select { flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; background:white; cursor:pointer; }
        .side-btn.active, .type-select.active { background: var(--accent); color:white; border-color: var(--accent); font-weight:bold; }
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
        .night nav { background: #0a0000; border-right: 1px solid #400000; }
        .night .card { background: var(--night-card); border: 1px solid #400000; }
        .night #auth-screen { background: #000; color: #ff0000; }
        .night .side-btn, .night .type-select { background:#1a0000; color:#ff0000; border-color:#400000; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color: var(--accent)">Eco Family Flow</h1>
    <button onclick="login()" style="padding: 15px 30px; border-radius: 30px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer;">Sign in with Google</button>
</div>

<div id="app-interface">
    <nav>
        <button class="tab-btn active" onclick="showPage('milk', this)">🍼</button>
        <button class="tab-btn" onclick="showPage('nappy', this)">🧷</button>
        <button class="tab-btn" onclick="showPage('scalper', this)">📈</button>
        <button class="tab-btn" onclick="logout()" style="margin-top: auto;">🏃</button>
    </nav>
    <main>
        <div id="milk" class="page">
            <h2 style="color: var(--accent); margin-top:0;">🍼 Milk Entry</h2>
            <div class="card">
                <input type="datetime-local" id="feedTime" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button id="mode-pump" class="type-select active" onclick="setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="type-select" onclick="setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                    <button id="sideL" class="side-btn active" onclick="setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="setSide('Right')">Right</button>
                    <button id="sideB" class="side-btn" onclick="setSide('Both')">Both</button>
                </div>
                <label id="amtLabel" style="display:block; font-size:12px; margin-bottom:5px;">Amount (ml)</label>
                <input type="number" id="milkAmt" placeholder="0" style="font-size: 24px; text-align: center; width: 100%; padding:15px; border-radius:12px; margin-bottom:20px; box-sizing:border-box; background:#f9f9f9; border:none;">
                <button class="save-btn" id="saveBtn" onclick="submitMilkLog()">Confirm & Save</button>
            </div>
        </div>

        <div id="nappy" class="page" style="display:none">
            <h2 style="color: var(--accent); margin-top:0;">🧷 Nappy Log</h2>
            <div class="card">Coming Soon...</div>
        </div>

        <div id="scalper" class="page" style="display:none">
            <h2 style="color: var(--accent); margin-top:0;">📈 Feeding Trends</h2>
            <div id="stats-box"></div>
            <div class="card">
                <button onclick="loadChartData()" style="background:var(--accent); color:white; border:none; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; font-weight:bold; cursor:pointer;">🔄 Refresh My Stats</button>
                <div style="height: 300px; width: 100%;"><canvas id="milkChart"></canvas></div>
            </div>
        </div>
    </main>
</div>

<button class="night-toggle" onclick="document.body.classList.toggle('night')">🌙</button>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    window.currentMode = 'Pump';
    window.currentSide = 'Left';
    let myChart = null;

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
        document.getElementById('amtLabel').innerText = m === 'Pump' ? 'Amount Pumped (ml)' : 'Amount Fed (ml)';
    };

    window.setSide = (s) => {
        window.currentSide = s;
        document.getElementById('sideL').classList.toggle('active', s === 'Left');
        document.getElementById('sideR').classList.toggle('active', s === 'Right');
        document.getElementById('sideB').classList.toggle('active', s === 'Both');
    };

    window.submitMilkLog = async () => {
        const btn = document.getElementById('saveBtn');
        const amt = document.getElementById('milkAmt').value;
        const time = document.getElementById('feedTime').value;
        const userEmail = (window.auth && window.auth.currentUser) ? window.auth.currentUser.email : "Unknown";

        if(!amt) return alert("Enter amount!");
        btn.innerText = "⌛ Sending...";

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ timestamp: time, category: 'Milk', value: amt, detail1: `${window.currentMode} (${window.currentSide})`, user: userEmail })});
            btn.innerText = "✅ Saved!";
            setTimeout(() => { btn.innerText = "Confirm & Save"; document.getElementById('milkAmt').value = ''; }, 2000);
        } catch (e) { alert("Error saving!"); btn.innerText = "❌ Error"; }
    };

    window.loadChartData = async () => {
    const btn = document.querySelector('#scalper button');
    btn.innerText = "⌛ Calculating...";
    
    try {
        const response = await fetch(GOOGLE_URL);
        const allData = await response.json();
        const userEmail = window.auth.currentUser.email;

        // 1. Filter and Sort by Time
        let myMilk = allData.filter(row => row.user === userEmail && row.category === 'Milk');
        myMilk.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        // 2. Math for Totals
        const today = new Date().toLocaleDateString();
        let totalAllTime = 0;
        let totalFedAllTime = 0;
        let totalToday = 0;

        myMilk.forEach(row => {
            const val = parseFloat(row.value) || 0;
            const isPump = row.detail1 && row.detail1.includes('Pump');
            const isFeed = row.detail1 && row.detail1.includes('Feed');

            if (isPump) {
                totalAllTime += val;
                if (new Date(row.timestamp).toLocaleDateString() === today) {
                    totalToday += val;
                }
            }
            if (isFeed) {
                totalFedAllTime += val;
            }
        });

        // 3. Update the UI with Totals
        const remaining = totalAllTime - totalFedAllTime;
        document.getElementById('stats-box').innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <div class="card" style="margin:0; text-align:center; border-left:4px solid #81c784;">
                    <small>Today's Pump</small><br><strong>${totalToday}ml</strong>
                </div>
                <div class="card" style="margin:0; text-align:center; border-left:4px solid #fb8c00;">
                    <small>In Fridge</small><br><strong>${remaining}ml</strong>
                </div>
            </div>
            <div class="card" style="margin:0 0 15px 0; text-align:center; background:#f0f7f0;">
                <small>All-Time Pumped Total</small><br><strong style="font-size:20px;">${totalAllTime}ml</strong>
            </div>
        `;

        // 4. Draw the Graph
        const labels = myMilk.map(d => {
            const dt = new Date(d.timestamp);
            return dt.toLocaleDateString([], {day:'2-digit', month:'short'}) + ' ' + dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        });

        const ctx = document.getElementById('milkChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line', // Line graph shows trends better over days
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Pumped',
                        data: myMilk.map(d => d.detail1.includes('Pump') ? d.value : null),
                        borderColor: '#81c784',
                        backgroundColor: '#81c784',
                        spanGaps: true,
                        tension: 0.3
                    },
                    {
                        label: 'Fed',
                        data: myMilk.map(d => d.detail1.includes('Feed') ? d.value : null),
                        borderColor: '#fb8c00',
                        backgroundColor: '#fb8c00',
                        spanGaps: true,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
        btn.innerText = "🔄 Refresh My Stats";
    } catch (e) {
        btn.innerText = "❌ Load Failed";
        console.error(e);
    }
};

</script>
</body>
</html>
