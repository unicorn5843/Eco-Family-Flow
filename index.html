<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-interface').style.display = 'flex';
          resetTimeInputs();
          loadMilkData(); 
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-interface').style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
      window.logout = () => signOut(auth).then(() => location.reload());

      window.resetTimeInputs = () => {
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          const timeStr = now.toISOString().slice(0, 16);
          document.querySelectorAll('input[type="datetime-local"]').forEach(i => i.value = timeStr);
      };
    </script>
    
    <style>
        :root {
            --bg: #f4f9f4; --side: #dceddc; --card: #ffffff; --text: #2d412d; --accent: #81c784; --chart-grid: #ddd;
        }
        body.night {
            --bg: #000000; --side: #1a0000; --card: #120000; --text: #cc0000; --accent: #880000; --chart-grid: #330000;
        }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app-interface { display: none; width: 100%; height: 100%; }
        
        nav { width: 70px; background: var(--side); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(0,0,0,0.1); }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 25px; cursor: pointer; padding: 12px; border-radius: 12px; filter: grayscale(1); transition: 0.2s; }
        .tab-btn.active { background: var(--accent); filter: none; color: white; }
        
        main { flex: 1; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        input { background: var(--card); color: var(--text); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .side-btn { flex:1; padding:10px; border-radius:10px; border:1px solid var(--accent); background: var(--card); color: var(--text); cursor:pointer; font-size: 14px; text-align: center; }
        .side-btn.active { background: var(--accent); color: white !important; font-weight:bold; }
        
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid rgba(128,128,128,0.2); font-size:14px; }
        .del-btn { color: #ff5252; background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 10px; }
        
        .stat-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-top: 4px solid var(--accent); font-size: 14px; }
        
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #222; color: #ff0000; border: 2px solid #440000; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; z-index: 100; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color: var(--accent)">Eco Family Flow</h1>
    <button onclick="login()" class="save-btn" style="width: auto; padding: 15px 30px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <nav>
        <button class="tab-btn active" onclick="showPage('milk', this)">🤱</button>
        <button class="tab-btn" onclick="showPage('formula', this)">🥛</button>
        <button class="tab-btn" onclick="logout()" style="margin-top: auto; filter:none">🏃</button>
    </nav>
    <main>
        <div id="milk" class="page">
            <h2 style="margin-top:0;">🤱 Milk Command</h2>
            <div class="card">
                <input type="datetime-local" id="feedTime">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button id="mode-pump" class="side-btn active" onclick="setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="side-btn" onclick="setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button id="sideL" class="side-btn active" onclick="setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="setSide('Right')">Right</button>
                    <button id="sideB" class="side-btn" onclick="setSide('Both')">Both</button>
                </div>
                <input type="number" id="milkAmt" placeholder="Amount (ml)" style="font-size: 20px; text-align: center;">
                <button class="save-btn" id="saveBtn" onclick="submitLog('Milk')">Confirm & Save</button>
            </div>
            
            <div id="milk-stats-area"></div>
            <div class="card">
                <div style="height: 250px;"><canvas id="milkChart"></canvas></div>
            </div>
            <div class="card">
                <small><strong>Recent History</strong></small>
                <div id="milk-history"></div>
            </div>
        </div>

        <div id="formula" class="page" style="display:none">
            <h2 style="margin-top:0;">🥛 Formula Tracker</h2>
            <div class="card">
                <input type="datetime-local" id="formulaTime">
                <input type="number" id="formulaAmt" placeholder="Bottle (ml)" style="font-size: 20px; text-align: center;">
                <button class="save-btn" id="formulaSaveBtn" onclick="submitLog('Formula')">Save Bottle</button>
            </div>
            
            <div id="formula-stats-area"></div>
            <div class="card">
                <div style="height: 250px;"><canvas id="formulaChart"></canvas></div>
            </div>
            <div class="card">
                <small><strong>Recent History</strong></small>
                <div id="formula-history"></div>
            </div>
        </div>
    </main>
</div>

<button class="night-toggle" onclick="toggleNight()">🌙</button>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    window.currentSide = 'Left';
    window.currentMode = 'Pump';
    let milkChart = null;
    let formulaChart = null;

    function toggleNight() {
        document.body.classList.toggle('night');
        if(document.getElementById('milk').style.display !== 'none') loadMilkData();
        else loadFormulaData();
    }

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        id === 'milk' ? loadMilkData() : loadFormulaData();
    };

    window.setSide = (s) => {
        window.currentSide = s;
        ['L', 'R', 'B'].forEach(x => document.getElementById(`side${x}`).classList.remove('active'));
        document.getElementById(`side${s.charAt(0)}`).classList.add('active');
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
    };

    window.submitLog = async (cat) => {
        const amt = document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt').value;
        const time = document.getElementById(cat === 'Milk' ? 'feedTime' : 'formulaTime').value;
        const btn = document.getElementById(cat === 'Milk' ? 'saveBtn' : 'formulaSaveBtn');
        if(!amt) return alert("Enter amount!");
        btn.innerText = "⌛ Saving...";

        const payload = { 
            timestamp: time, 
            category: cat, 
            value: amt, 
            detail1: cat === 'Milk' ? `${window.currentMode} (${window.currentSide})` : 'Bottle', 
            user: window.auth.currentUser.email 
        };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            btn.innerText = "✅ Saved!";
            setTimeout(() => { 
                btn.innerText = cat === 'Milk' ? "Confirm & Save" : "Save Bottle";
                document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt').value = '';
                cat === 'Milk' ? loadMilkData() : loadFormulaData();
            }, 1000);
        } catch (e) { alert("Error connecting to sheet."); btn.innerText = "Error"; }
    };

    // Calculate 7-Day Moving Average
    function getMovingAverage(dataArr, index, span = 7) {
        let sum = 0; let count = 0;
        for (let i = Math.max(0, index - span + 1); i <= index; i++) {
            sum += dataArr[i]; count++;
        }
        return count > 0 ? (sum / count).toFixed(1) : 0;
    }

    window.loadMilkData = async () => {
        const hist = document.getElementById('milk-history');
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const myLogs = data.filter(r => r.user === window.auth.currentUser.email && r.category === 'Milk')
                               .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let dailyObj = {};
            myLogs.forEach(r => {
                const dtStr = new Date(r.timestamp).toLocaleDateString([], {day:'2-digit', month:'short'});
                if(!dailyObj[dtStr]) dailyObj[dtStr] = { pump: 0, feed: 0 };
                
                let val = parseFloat(r.value) || 0;
                if(r.detail1 && r.detail1.includes('Pump')) dailyObj[dtStr].pump += val;
                else dailyObj[dtStr].feed += val;
            });

            // Prepare chart arrays
            const labels = Object.keys(dailyObj).slice(-10); // show last 10 active days
            const pumpData = labels.map(l => dailyObj[l].pump);
            const feedData = labels.map(l => dailyObj[l].feed);
            
            // Total daily volume for moving average
            const totalDailyData = labels.map(l => dailyObj[l].pump + dailyObj[l].feed);
            const movingAvgData = totalDailyData.map((_, i) => getMovingAverage(totalDailyData, i, 7));

            // Stats
            const todayStr = new Date().toLocaleDateString([], {day:'2-digit', month:'short'});
            const todayPump = dailyObj[todayStr] ? dailyObj[todayStr].pump : 0;
            const todayFeed = dailyObj[todayStr] ? dailyObj[todayStr].feed : 0;

            document.getElementById('milk-stats-area').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card">Today's Pump<br><strong>${todayPump}ml</strong></div>
                    <div class="stat-card">Today's Feed<br><strong>${todayFeed}ml</strong></div>
                </div>`;

            hist.innerHTML = myLogs.slice(-8).reverse().map(r => `
                <div class="hist-item">
                    <span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml (${r.detail1})</span>
                    <button class="del-btn" onclick="deleteItem('${r.timestamp}', 'milk')">✕</button>
                </div>`).join('') || '<div style="padding:10px">No logs yet.</div>';
            
            renderMilkChart(labels, pumpData, feedData, movingAvgData);
        } catch(e) { hist.innerHTML = "⚠️ Data Load Failed"; console.error(e); }
    };

    window.loadFormulaData = async () => {
        const hist = document.getElementById('formula-history');
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const myLogs = data.filter(r => r.user === window.auth.currentUser.email && r.category === 'Formula')
                               .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let dailyObj = {};
            myLogs.forEach(r => {
                const dtStr = new Date(r.timestamp).toLocaleDateString([], {day:'2-digit', month:'short'});
                dailyObj[dtStr] = (dailyObj[dtStr] || 0) + (parseFloat(r.value) || 0);
            });

            // Prepare chart arrays
            const labels = Object.keys(dailyObj).slice(-10);
            const formulaData = labels.map(l => dailyObj[l]);
            const movingAvgData = formulaData.map((_, i) => getMovingAverage(formulaData, i, 7));

            // Stats
            const todayStr = new Date().toLocaleDateString([], {day:'2-digit', month:'short'});
            const todayTotal = dailyObj[todayStr] || 0;

            document.getElementById('formula-stats-area').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card" style="grid-column: span 2;">Today's Formula Total<br><strong>${todayTotal}ml</strong></div>
                </div>`;

            hist.innerHTML = myLogs.slice(-8).reverse().map(r => `
                <div class="hist-item">
                    <span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml</span>
                    <button class="del-btn" onclick="deleteItem('${r.timestamp}', 'formula')">✕</button>
                </div>`).join('') || '<div style="padding:10px">No logs yet.</div>';
            
            renderFormulaChart(labels, formulaData, movingAvgData);
        } catch(e) { hist.innerHTML = "⚠️ Data Load Failed"; }
    };

    function getChartColors() {
        const isNight = document.body.classList.contains('night');
        return {
            grid: isNight ? '#330000' : '#eeeeee',
            text: isNight ? '#cc0000' : '#666666',
            line: isNight ? '#ffaaaa' : '#999999'
        };
    }

    function renderMilkChart(labels, pumpData, feedData, maData) {
        const ctx = document.getElementById('milkChart').getContext('2d');
        const c = getChartColors();
        if(milkChart) milkChart.destroy();
        
        milkChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: '7-Day Avg (Total)', data: maData, borderColor: c.line, borderDash: [5, 5], tension: 0.3, fill: false },
                    { label: 'Pump', data: pumpData, backgroundColor: '#81c784', borderRadius: 4 },
                    { label: 'Feed', data: feedData, backgroundColor: '#ffb74d', borderRadius: 4 }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { grid: { display: false }, ticks: { color: c.text } },
                    y: { grid: { color: c.grid }, ticks: { color: c.text }, beginAtZero: true }
                },
                plugins: { legend: { labels: { color: c.text } } }
            }
        });
    }

    function renderFormulaChart(labels, data, maData) {
        const ctx = document.getElementById('formulaChart').getContext('2d');
        const c = getChartColors();
        if(formulaChart) formulaChart.destroy();
        
        formulaChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: '7-Day Avg', data: maData, borderColor: c.line, borderDash: [5, 5], tension: 0.3, fill: false },
                    { label: 'Formula', data: data, backgroundColor: '#64b5f6', borderRadius: 4 }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { grid: { display: false }, ticks: { color: c.text } },
                    y: { grid: { color: c.grid }, ticks: { color: c.text }, beginAtZero: true }
                },
                plugins: { legend: { labels: { color: c.text } } }
            }
        });
    }

    window.deleteItem = async (ts, type) => {
        if(!confirm("Delete this log permanently?")) return;
        try {
            await fetch(GOOGLE_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ action: 'delete', timestamp: ts, user: window.auth.currentUser.email })
            });
            setTimeout(() => {
                type === 'milk' ? loadMilkData() : loadFormulaData();
            }, 1000);
        } catch (e) { alert("Failed to delete."); }
    };
</script>
</body>
</html>
