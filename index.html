<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth; // Unified auth variable

      onAuthStateChanged(auth, (user) => {
        const authScreen = document.getElementById('auth-screen');
        const appInterface = document.getElementById('app-interface');
        if (user) {
          if(authScreen) authScreen.style.display = 'none';
          if(appInterface) appInterface.style.display = 'block';
          if(window.resetTimeInputs) window.resetTimeInputs();
          if(window.refreshCurrentPage) window.refreshCurrentPage(); 
        } else {
          if(authScreen) authScreen.style.display = 'flex';
          if(appInterface) appInterface.style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider).catch(e => alert("Login Error: " + e.message));
      window.logout = () => signOut(auth).then(() => location.reload());
    </script>
    
    <style>
        :root { --bg: #f4f9f4; --card: #ffffff; --text: #2d412d; --accent: #81c784; --timer-bg: #e8f5e9; --active-tile-border: #4caf50; }
        body.night { --bg: #000000; --card: #120000; --text: #cc0000; --accent: #880000; --timer-bg: #210000; --active-tile-border: #ff1744; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 70px; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app-interface { display: none; width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        header { text-align: center; margin-bottom: 20px; }
        .logo-text { font-size: 24px; font-weight: bold; color: var(--accent); }
        #tab-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .tab-tile { background: var(--card); border-radius: 12px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .tab-tile.active { border-color: var(--active-tile-border); }
        .tile-emoji { font-size: 24px; }
        .tile-label { font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { background: var(--card); color: var(--text); border: 1px solid var(--accent); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .side-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: var(--card); color: var(--text); cursor: pointer; }
        .side-btn.active { background: var(--accent); color: white; }
        #fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(0,0,0,0.1); }
        .fixed-action { cursor: pointer; font-size: 14px; display: flex; align-items: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo-text">Eco Family Flow</div>
    <button onclick="window.login()" class="save-btn" style="width: auto; padding: 15px 30px; margin-top: 15px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <header><div class="logo-text">Eco Family Flow</div></header>

    <section id="tab-grid">
        <div id="tile-milk" class="tab-tile active" onclick="window.showPage('milk', this)"><span class="tile-emoji">🤱</span><span class="tile-label">Milk</span></div>
        <div id="tile-formula" class="tab-tile" onclick="window.showPage('formula', this)"><span class="tile-emoji">🥛</span><span class="tile-label">Formula</span></div>
        <div id="tile-skin" class="tab-tile" onclick="window.showPage('skin-to-skin', this)"><span class="tile-emoji">🫂</span><span class="tile-label">Skin</span></div>
    </section>

    <main>
        <div id="milk" class="page active">
            <div class="card">
                <input type="datetime-local" id="feedTime">
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="mode-pump" class="side-btn active" onclick="window.setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="side-btn" onclick="window.setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="sideL" class="side-btn active" onclick="window.setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="window.setSide('Right')">Right</button>
                </div>
                <input type="number" id="milkAmt" placeholder="Amount (ml)">
                <button class="save-btn" id="saveBtn" onclick="window.submitLog('Milk')">Save Milk</button>
            </div>
            <div class="card"><canvas id="milkChart" style="height:200px;"></canvas></div>
        </div>

        <div id="formula" class="page">
            <div class="card">
                <input type="datetime-local" id="formulaTime">
                <input type="number" id="formulaAmt" placeholder="Bottle (ml)">
                <button class="save-btn" id="formulaSaveBtn" onclick="window.submitLog('Formula')">Save Bottle</button>
            </div>
            <div class="card"><canvas id="formulaChart" style="height:200px;"></canvas></div>
        </div>

        <div id="skin-to-skin" class="page">
            <div class="card">
                <label>Start</label><input type="datetime-local" id="skinStart">
                <label>End</label><input type="datetime-local" id="skinEnd">
                <button class="save-btn" id="skinSaveBtn" onclick="window.submitSkinLog()">Log Session</button>
            </div>
        </div>
    </main>
</div>

<footer id="fixed-bottom">
    <div class="fixed-action" onclick="window.toggleNight()"><span id="night-icon">🌙</span> Night Mode</div>
    <div class="fixed-action" onclick="window.logout()">🏃 Logout</div>
</footer>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zj15xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    window.currentSide = 'Left';
    window.currentMode = 'Pump';
    window.activeTab = 'milk';

    window.setSide = (s) => { 
        window.currentSide = s; 
        document.getElementById('sideL').classList.toggle('active', s === 'Left');
        document.getElementById('sideR').classList.toggle('active', s === 'Right');
    };

    window.setMilkMode = (m) => { 
        window.currentMode = m; 
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
    };

    window.resetTimeInputs = () => { 
        const now = new Date(); 
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); 
        const timeStr = now.toISOString().slice(0, 16); 
        document.querySelectorAll('#feedTime, #formulaTime, #skinStart, #skinEnd').forEach(i => i.value = timeStr); 
    };

    window.toggleNight = () => {
        document.body.classList.toggle('night');
        document.getElementById('night-icon').innerText = document.body.classList.contains('night') ? '☀️' : '🌙';
    };

    window.showPage = (id, btn) => {
        window.activeTab = id;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-tile').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        window.refreshCurrentPage();
    };

    window.submitLog = async (cat) => {
        const email = window.auth?.currentUser?.email;
        if (!email) return;

        const amt = document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt').value;
        const time = document.getElementById(cat === 'Milk' ? 'feedTime' : 'formulaTime').value;
        if(!amt) return;

        const payload = { 
            timestamp: time, category: cat, value: amt, 
            detail: cat === 'Milk' ? `${window.currentMode} (${window.currentSide})` : 'Bottle', 
            user: email 
        };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Saved!");
            window.refreshCurrentPage();
        } catch (e) { console.error(e); }
    };

    window.submitSkinLog = async () => {
        const email = window.auth?.currentUser?.email;
        const start = new Date(document.getElementById('skinStart').value);
        const end = new Date(document.getElementById('skinEnd').value);
        const duration = Math.round((end - start) / 1000 / 60);

        if (duration <= 0) { alert("Invalid duration"); return; }

        const payload = {
            timestamp: new Date().toISOString(),
            category: 'SkinToSkin',
            value: duration,
            detail: 'Session', 
            user: email
        };

        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Session Logged!");
        window.refreshCurrentPage();
    };

    window.refreshCurrentPage = () => {
        if(window.activeTab === 'milk') renderChart('milkChart', 'Milk (ml)', [40, 50, 45, 60], '#81c784');
        if(window.activeTab === 'formula') renderChart('formulaChart', 'Formula (ml)', [60, 70, 65, 80], '#4caf50');
    };

    function renderChart(canvasId, label, data, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (Chart.getChart(canvasId)) Chart.getChart(canvasId).destroy();
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4'],
                datasets: [{ label: label, data: data, borderColor: color, tension: 0.4 }] // SMOOTH LINES
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
