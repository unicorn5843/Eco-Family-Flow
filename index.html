 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-interface').style.display = 'flex';
          resetTimeInputs();
          loadMilkData(); 
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-interface').style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider);
      window.logout = () => signOut(auth).then(() => location.reload());

      window.resetTimeInputs = () => {
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          const timeStr = now.toISOString().slice(0, 16);
          document.getElementById('feedTime').value = timeStr;
          document.getElementById('formulaTime').value = timeStr;
      };
    </script>
    
    <style>
        :root {
            --bg: #f4f9f4; --side: #dceddc; --card: #ffffff; --text: #2d412d; --accent: #81c784; --chart-grid: #eeeeee; --timer-bg: #e8f5e9;
        }
        body.night {
            --bg: #000000; --side: #1a0000; --card: #120000; --text: #cc0000; --accent: #880000; --chart-grid: #330000; --timer-bg: #210000;
        }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100dvh; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app-interface { display: none; width: 100%; height: 100%; }
        
        nav { width: 70px; background: var(--side); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(0,0,0,0.1); }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 25px; cursor: pointer; padding: 12px; border-radius: 12px; filter: grayscale(1); transition: 0.2s; }
        .tab-btn.active { background: var(--accent); filter: none; color: white; }
        
        main { flex: 1; padding: 15px; padding-bottom: 100px; overflow-y: auto; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .timer-banner { background: var(--timer-bg); padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); font-weight: bold; font-size: 15px; }

        input { background: var(--card); color: var(--text); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        
        .side-btn { flex:1; padding:10px; border-radius:10px; border:1px solid var(--accent); background: var(--card); color: var(--text); cursor:pointer; font-size: 14px; text-align: center; }
        .side-btn.active { background: var(--accent); color: white !important; font-weight:bold; }
        
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid rgba(128,128,128,0.2); font-size:14px; }
        .del-btn { color: #ff5252; background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 10px; }
        
        .stat-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-top: 4px solid var(--accent); font-size: 14px; }
        
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #222; color: #ff0000; border: 2px solid #440000; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; z-index: 100; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color: var(--accent)">Eco Family Flow</h1>
    <button onclick="login()" class="save-btn" style="width: auto; padding: 15px 30px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <nav>
        <button id="btn-milk" class="tab-btn active" onclick="showPage('milk', this)">🤱</button>
        <button id="btn-formula" class="tab-btn" onclick="showPage('formula', this)">🥛</button>
        <button id="btn-combined" class="tab-btn" onclick="showPage('combined', this)">📈</button>
        <button class="tab-btn" onclick="logout()" style="margin-top: auto; filter:none">🏃</button>
    </nav>
    <main>
        <div id="milk" class="page">
            <h2 style="margin-top:0;">🤱 Milk Command</h2>
            <div id="milk-timer" class="timer-banner">Calculating last feed...</div>
            <div class="card">
                <input type="datetime-local" id="feedTime">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button id="mode-pump" class="side-btn active" onclick="setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="side-btn" onclick="setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button id="sideL" class="side-btn active" onclick="setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="setSide('Right')">Right</button>
                    <button id="sideB" class="side-btn" onclick="setSide('Both')">Both</button>
                </div>
                <input type="number" id="milkAmt" placeholder="Amount (ml)" style="font-size: 20px; text-align: center;">
                <button class="save-btn" id="saveBtn" onclick="submitLog('Milk')">Confirm & Save</button>
            </div>
            <div id="milk-stats-area"></div>
            <div class="card"><div style="height: 250px;"><canvas id="milkChart"></canvas></div></div>
            <div class="card"><small><strong>Recent History</strong></small><div id="milk-history"></div></div>
        </div>

        <div id="formula" class="page" style="display:none">
            <h2 style="margin-top:0;">🥛 Formula Tracker</h2>
            <div id="formula-timer" class="timer-banner">Calculating last bottle...</div>
            <div class="card">
                <input type="datetime-local" id="formulaTime">
                <input type="number" id="formulaAmt" placeholder="Bottle (ml)" style="font-size: 20px; text-align: center;">
                <button class="save-btn" id="formulaSaveBtn" onclick="submitLog('Formula')">Save Bottle</button>
            </div>
            <div id="formula-stats-area"></div>
            <div class="card"><div style="height: 250px;"><canvas id="formulaChart"></canvas></div></div>
            <div class="card"><small><strong>Recent History</strong></small><div id="formula-history"></div></div>
        </div>

        <div id="combined" class="page" style="display:none">
            <h2 style="margin-top:0;">📈 Combined Intake</h2>
            <div id="combined-stats-area"></div>
            <div class="card">
                <small><strong>Daily Feed + Formula Volume</strong></small>
                <div style="height: 250px; margin-top:10px;"><canvas id="combinedChart"></canvas></div>
            </div>
            <div id="combined-insights-area"></div>
        </div>
    </main>
</div>

<button class="night-toggle" onclick="toggleNight()">🌙</button>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    window.currentSide = 'Left';
    window.currentMode = 'Pump';
    window.activeTab = 'milk';
    let milkChart = null, formulaChart = null, combinedChart = null;
    let lastMilkTime = null, lastFormulaTime = null;

    function updateClocks() {
        if (lastMilkTime) document.getElementById('milk-timer').innerText = `Last Feed: ${getTimeAgo(lastMilkTime)}`;
        if (lastFormulaTime) document.getElementById('formula-timer').innerText = `Last Bottle: ${getTimeAgo(lastFormulaTime)}`;
    }

    function getTimeAgo(timestamp) {
        const diff = Math.floor((new Date() - new Date(timestamp)) / 1000 / 60);
        if (diff < 0) return "Just now";
        const h = Math.floor(diff / 60);
        const m = diff % 60;
        return `${h}h ${m}m ago`;
    }

    setInterval(updateClocks, 60000);

    window.toggleNight = () => {
        document.body.classList.toggle('night');
        refreshCurrentPage();
    };

    window.showPage = (id, btn) => {
        window.activeTab = id;
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        refreshCurrentPage();
    };

    function refreshCurrentPage() {
        if(window.activeTab === 'milk') loadMilkData();
        else if(window.activeTab === 'formula') loadFormulaData();
        else loadCombinedData();
    }

    window.setSide = (s) => {
        window.currentSide = s;
        ['L', 'R', 'B'].forEach(x => document.getElementById(`side${x}`).classList.remove('active'));
        document.getElementById(`side${s.charAt(0)}`).classList.add('active');
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
    };

    window.submitLog = async (cat) => {
        const amtInput = document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt');
        const timeInput = document.getElementById(cat === 'Milk' ? 'feedTime' : 'formulaTime');
        const btn = document.getElementById(cat === 'Milk' ? 'saveBtn' : 'formulaSaveBtn');
        if(!amtInput.value) return;
        btn.innerText = "⌛ Saving...";
        const payload = { 
            timestamp: timeInput.value, category: cat, value: amtInput.value, 
            detail1: cat === 'Milk' ? `${window.currentMode} (${window.currentSide})` : 'Bottle', 
            user: window.auth.currentUser.email 
        };
        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            btn.innerText = "✅ Saved!";
            amtInput.value = '';
            setTimeout(() => { 
                btn.innerText = cat === 'Milk' ? "Confirm & Save" : "Save Bottle";
                refreshCurrentPage();
            }, 1500);
        } catch (e) { btn.innerText = "❌ Error"; }
    };

    window.loadMilkData = async () => {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const myLogs = data.filter(r => r.user === window.auth.currentUser.email && r.category === 'Milk').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            const feeds = myLogs.filter(r => r.detail1 && r.detail1.includes('Feed'));
            if(feeds.length > 0) { lastMilkTime = feeds[feeds.length - 1].timestamp; updateClocks(); }
            let dailyObj = {};
            myLogs.forEach(r => {
                const dtStr = new Date(r.timestamp).toLocaleDateString([], {day:'2-digit', month:'short'});
                if(!dailyObj[dtStr]) dailyObj[dtStr] = { pump: 0, feed: 0 };
                let val = parseFloat(r.value) || 0;
                if(r.detail1 && r.detail1.includes('Pump')) dailyObj[dtStr].pump += val; else dailyObj[dtStr].feed += val;
            });
            const labels = Object.keys(dailyObj).slice(-10);
            document.getElementById('milk-stats-area').innerHTML = `<div class="stat-grid"><div class="stat-card">Today's Pump<br><strong>${dailyObj[labels[labels.length-1]]?.pump || 0}ml</strong></div><div class="stat-card">Today's Feed<br><strong>${dailyObj[labels[labels.length-1]]?.feed || 0}ml</strong></div></div>`;
            document.getElementById('milk-history').innerHTML = myLogs.slice(-8).reverse().map(r => `<div class="hist-item"><span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml (${r.detail1})</span><button class="del-btn" onclick="deleteItem('${r.timestamp}', 'milk')">✕</button></div>`).join('');
            renderChart('milkChart', labels, [{ label: 'Pump', data: labels.map(l => dailyObj[l].pump), borderColor: '#81c784', backgroundColor: 'rgba(129, 199, 132, 0.2)', tension: 0.4, fill: true }, { label: 'Feed', data: labels.map(l => dailyObj[l].feed), borderColor: '#ffb74d', backgroundColor: 'rgba(255, 183, 77, 0.2)', tension: 0.4, fill: true }]);
        } catch(e) {}
    };

    window.loadFormulaData = async () => {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const myLogs = data.filter(r => r.user === window.auth.currentUser.email && r.category === 'Formula').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            if(myLogs.length > 0) { lastFormulaTime = myLogs[myLogs.length - 1].timestamp; updateClocks(); }
            let dailyObj = {};
            myLogs.forEach(r => {
                const dtStr = new Date(r.timestamp).toLocaleDateString([], {day:'2-digit', month:'short'});
                dailyObj[dtStr] = (dailyObj[dtStr] || 0) + (parseFloat(r.value) || 0);
            });
            const labels = Object.keys(dailyObj).slice(-10);
            document.getElementById('formula-stats-area').innerHTML = `<div class="stat-grid"><div class="stat-card" style="grid-column: span 2;">Today's Formula Total<br><strong>${dailyObj[labels[labels.length-1]] || 0}ml</strong></div></div>`;
            document.getElementById('formula-history').innerHTML = myLogs.slice(-8).reverse().map(r => `<div class="hist-item"><span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml</span><button class="del-btn" onclick="deleteItem('${r.timestamp}', 'formula')">✕</button></div>`).join('');
            renderChart('formulaChart', labels, [{ label: 'Formula', data: labels.map(l => dailyObj[l]), borderColor: '#64b5f6', backgroundColor: 'rgba(100, 181, 246, 0.2)', tension: 0.4, fill: true }]);
        } catch(e) {}
    };

    window.loadCombinedData = async () => {
        const statsArea = document.getElementById('combined-stats-area');
        const insightsArea = document.getElementById('combined-insights-area');
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const myLogs = data.filter(r => r.user === window.auth.currentUser.email);
            
            let dailyTotal = {};
            let feedCount = {};
            
            myLogs.forEach(r => {
                if (r.category === 'Formula' || (r.category === 'Milk' && r.detail1.includes('Feed'))) {
                    const dtStr = new Date(r.timestamp).toLocaleDateString([], {day:'2-digit', month:'short'});
                    dailyTotal[dtStr] = (dailyTotal[dtStr] || 0) + (parseFloat(r.value) || 0);
                    feedCount[dtStr] = (feedCount[dtStr] || 0) + 1;
                }
            });

            const labels = Object.keys(dailyTotal).sort((a,b) => new Date(a) - new Date(b)).slice(-10);
            if(labels.length === 0) {
                statsArea.innerHTML = "<div class='card'>No data to combine yet!</div>";
                return;
            }

            const combinedValues = labels.map(l => dailyTotal[l]);
            const last7 = combinedValues.slice(-7);
            const avg = (last7.reduce((a, b) => a + b, 0) / (last7.length || 1)).toFixed(1);
            const todayTotal = dailyTotal[labels[labels.length-1]] || 0;
            const todayCount = feedCount[labels[labels.length-1]] || 0;

            statsArea.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card">Today's Intake<br><strong>${todayTotal}ml</strong></div>
                    <div class="stat-card">7-Day Average<br><strong>${avg}ml</strong></div>
                </div>`;
            
            insightsArea.innerHTML = `
                <div class="card">
                    <small><strong>Daily Insights</strong></small>
                    <div style="display:flex; justify-content:space-around; margin-top:10px;">
                        <div style="text-align:center"><small>Feeds Today</small><br><strong>${todayCount}</strong></div>
                        <div style="text-align:center"><small>Avg Session</small><br><strong>${todayCount ? (todayTotal/todayCount).toFixed(0) : 0}ml</strong></div>
                    </div>
                </div>`;

            renderChart('combinedChart', labels, [{ label: 'Total Intake', data: combinedValues, borderColor: '#9575cd', backgroundColor: 'rgba(149, 117, 205, 0.2)', tension: 0.4, fill: true }]);
        } catch(e) { statsArea.innerHTML = "⚠️ Load Failed"; }
    };

    function renderChart(canvasId, labels, datasets) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const isNight = document.body.classList.contains('night');
        const textColor = isNight ? '#cc0000' : '#666666';
        const gridColor = isNight ? '#330000' : '#eeeeee';
        if(canvasId === 'milkChart' && milkChart) milkChart.destroy();
        if(canvasId === 'formulaChart' && formulaChart) formulaChart.destroy();
        if(canvasId === 'combinedChart' && combinedChart) combinedChart.destroy();
        const chartObj = new Chart(ctx, {
            type: 'line', data: { labels: labels, datasets: datasets },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { grid: { display: false }, ticks: { color: textColor } },
                    y: { grid: { color: gridColor }, ticks: { color: textColor }, beginAtZero: true }
                },
                plugins: { legend: { labels: { color: textColor } } }
            }
        });
        if (canvasId === 'milkChart') milkChart = chartObj;
        else if (canvasId === 'formulaChart') formulaChart = chartObj;
        else combinedChart = chartObj;
    }

    window.deleteItem = async (ts, type) => {
        if(!confirm("Delete this log permanently?")) return;
        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors',
