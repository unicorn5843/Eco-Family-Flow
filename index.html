<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Family Flow</title>
    <style>
        :root {
            --bg: #f2f9f2; --sidebar: #dceddc; --card: #ffffff;
            --text: #2d412d; --accent: #88b388; --night-bg: #000;
            --night-text: #ff0000; --night-card: #1a0000;
        }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; }
        body.night { background: var(--night-bg); color: var(--night-text); }

        /* SIDEBAR */
        nav { width: 70px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #c8d6c8; }
        .night nav { background: #0a0000; border-right: 1px solid #400000; }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 20px; cursor: pointer; padding: 10px; border-radius: 10px; }
        .tab-btn.active { background: var(--accent); color: white; }
        .night .tab-btn { color: #ff0000; }
        .night .tab-btn.active { background: #400000; border: 1px solid #ff0000; }

        /* CONTENT */
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .night .card { background: var(--night-card); border: 1px solid #400000; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .save-btn { background: #67a367; color: white; border: none; font-weight: bold; cursor: pointer; }
        .night .save-btn { background: #400000; color: #ff0000; border: 1px solid #ff0000; }
        
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="showPage('milk', this)">🍼</button>
    <button class="tab-btn" onclick="showPage('nappy', this)">🧷</button>
    <button class="tab-btn" onclick="showPage('weight', this)">⚖️</button>
    <button class="tab-btn" onclick="showPage('scalper', this)">📈</button>
    <button class="tab-btn" onclick="showPage('charts', this)">📊</button>
</nav>

<main>
    <div id="milk" class="page active">
        <h2>Milk Log</h2>
        <div class="card">
            <input type="number" id="milkAmt" placeholder="Amount (ml)" value="80">
            <select id="milkType"><option>Pumped</option><option>Formula</option></select>
            <button class="save-btn" onclick="logData('Milk', document.getElementById('milkAmt').value, document.getElementById('milkType').value)">Save</button>
        </div>
    </div>

    <div id="nappy" class="page">
        <h2>Nappy Log</h2>
        <div class="card">
            <select id="napType"><option>Wet</option><option>Dirty</option><option>Both</option></select>
            <input type="text" id="napNote" placeholder="Notes (Normal, Soft)">
            <button class="save-btn" onclick="logData('Nappy', document.getElementById('napType').value, document.getElementById('napNote').value)">Save</button>
        </div>
    </div>

    <div id="weight" class="page">
        <h2>Weight Log</h2>
        <div class="card">
            <input type="number" id="weightVal" step="0.01" placeholder="Weight (kg)">
            <button class="save-btn" onclick="logData('Weight', document.getElementById('weightVal').value, 'kg')">Save</button>
        </div>
    </div>

    <div id="scalper" class="page">
        <h2>Price Finder</h2>
        <div class="card">
            <p>Pampers S3: <b>£7.00</b> (Amazon)</p>
            <button class="save-btn" onclick="window.open('YOUR_AFFILIATE_LINK')">Buy Now</button>
        </div>
    </div>

    <div id="charts" class="page">
        <h2>Charts & Trends</h2>
        <div class="card"><h3>Milk Chart</h3><p>(Data loading...)</p></div>
        <div class="card"><h3>Weight Chart</h3><p>(Data loading...)</p></div>
    </div>
</main>

<button class="night-toggle" onclick="document.body.classList.toggle('night')">🌙</button>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function logData(cat, val, det1) {
        alert("Saving...");
        try {
            await fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ category: cat, value: val, detail1: det1 })
            });
            alert("✅ Saved to Sheet!");
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
