   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow (Test)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-interface').style.display = 'block';
          window.initApp();
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-interface').style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider);
      window.logout = () => signOut(auth).then(() => location.reload());
    </script>

    <style>
        :root { 
            --bg: #f2f7f4; --card: #ffffff; --text: #2f4f2f; --accent: #8fbca0; 
            --accent-dark: #6a9c7d; --border: #e0ebe3; --btn-text: #ffffff; 
            --delete: #ff6b6b; --warning: #ff9800; --success: #4caf50;
        }
        body.night { 
            --bg: #000000; --card: #0a0000; --text: #ff4d4d; --accent: #b30000; 
            --accent-dark: #800000; --border: #330000; --btn-text: #ffcccc; 
            --delete: #ff1a1a; --warning: #ff6600; --success: #00cc00;
        }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; transition: background-color 0.5s, color 0.5s; }
        #app-interface { display: none; max-width: 500px; margin: 0 auto; padding: 15px; }
        .header-title { text-align: center; font-size: 26px; font-weight: bold; color: var(--accent-dark); margin-bottom: 20px; }
        .sync-banner { position: fixed; top: 0; left: 0; right: 0; padding: 8px; text-align: center; font-size: 14px; font-weight: bold; z-index: 200; transition: 0.3s; }
        .banner-offline { background: #ff9800; color: white; }
        .banner-synced { background: #4caf50; color: white; }
        .child-selector { display: flex; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; gap: 5px; }
        .child-btn { padding: 8px 12px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 14px; }
        .child-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .current-child-badge { text-align: center; font-size: 14px; margin-top: -10px; margin-bottom: 15px; opacity: 0.8; }
        #nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-tile { background: var(--card); border-radius: 12px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--border); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.03); padding: 4px; }
        .nav-tile.wide { grid-column: span 2; aspect-ratio: auto; height: 70px; }
        .nav-tile.active { border-color: var(--accent); background: rgba(143, 188, 160, 0.1); }
        .nav-emoji { font-size: 24px; margin-bottom: 2px; }
        .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; text-align: center; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .input-group { margin-bottom: 12px; }
        input, select, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; font-family: inherit; }
        textarea { min-height: 80px; resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .toggle-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); background: var(--card); color: var(--accent-dark); font-weight: 600; cursor: pointer; }
        .toggle-btn.active { background: var(--accent); color: var(--btn-text); }
        .save-btn { background: var(--accent-dark); color: var(--btn-text); border: none; padding: 16px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .stat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 14px; text-align: center; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .stat-val { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
        .stat-lbl { font-size: 11px; text-transform: uppercase; opacity: 0.7; font-weight: 600; }
        .supply-card { background: var(--card); padding: 15px; border-radius: 14px; margin-bottom: 15px; border: 2px solid var(--border); }
        .supply-indicator { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .supply-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; margin: 0 10px; overflow: hidden; }
        .supply-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .supply-status { font-weight: bold; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .status-surplus { background: var(--success); color: white; }
        .status-balanced { background: var(--accent); color: white; }
        .status-deficit { background: var(--warning); color: white; }
        .status-critical { background: var(--delete); color: white; }
        .history-list { margin-top: 5px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        .delete-btn { cursor: pointer; opacity: 0.6; font-size: 18px; margin-left: 10px; }
        #fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-around; border-top: 1px solid var(--border); z-index: 100; }
        .footer-action { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 12px; font-weight: 600; opacity: 0.8; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loading { text-align: center; padding: 20px; font-weight: bold; color: var(--accent); display: none; }
        .chart-legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .error-banner { background: #ff6b6b; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 14px; }
        .med-timer-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .med-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .med-dosage { font-size: 14px; opacity: 0.8; margin-bottom: 4px; }
        .med-time { font-size: 13px; font-weight: 600; color: var(--accent-dark); }
        .hospital-note-item { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .hospital-name { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .hospital-note-text { font-size: 14px; margin: 8px 0; white-space: pre-wrap; }
        .hospital-timestamp { font-size: 12px; opacity: 0.7; }
        .product-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .price-per-unit { background: var(--accent); color: white; padding: 3px 8px; border-radius: 20px; font-size: 12px; display: inline-block; margin-left: 10px; }
        .handover-note { background: #fff9c4; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="header-title">Eco Family Flow</div>
    <button onclick="window.login()" class="save-btn" style="width: auto; padding: 15px 40px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <div id="sync-banner" class="sync-banner" style="display: none;"></div>
    
    <!-- Main App -->
    <div class="header-title">Eco Family Flow</div>

    <!-- Child Selector (5 children) -->
    <div class="child-selector" id="child-selector-container"></div>
    <div id="current-child-display" class="current-child-badge"></div>

    <!-- Handover Note -->

    <div id="error-banner" class="error-banner"></div>

    <!-- Navigation Grid -->
    <section id="nav-grid">
        <div id="tab-milk" class="nav-tile" onclick="window.switchTab('milk')"><span class="nav-emoji">🤱</span><span class="nav-label">Milk</span></div>
        <div id="tab-formula" class="nav-tile" onclick="window.switchTab('formula')"><span class="nav-emoji">🍼</span><span class="nav-label">Formula</span></div>
        <div id="tab-nappy" class="nav-tile" onclick="window.switchTab('nappy')"><span class="nav-emoji">🧻</span><span class="nav-label">Nappy</span></div>
        <div id="tab-skin" class="nav-tile" onclick="window.switchTab('skin')"><span class="nav-emoji">❤️</span><span class="nav-label">Skin</span></div>
        
        <div id="tab-meds" class="nav-tile" onclick="window.switchTab('meds')"><span class="nav-emoji">💊</span><span class="nav-label">Meds</span></div>
        <div id="tab-hospital" class="nav-tile" onclick="window.switchTab('hospital')"><span class="nav-emoji">🏥</span><span class="nav-label">Hospital</span></div>
        <div id="tab-stats" class="nav-tile" onclick="window.switchTab('stats')"><span class="nav-emoji">📊</span><span class="nav-label">Stats</span></div>
        <div id="tab-deals" class="nav-tile" onclick="window.switchTab('deals')"><span class="nav-emoji">🛒</span><span class="nav-label">Deals</span></div>
        
        <div id="tab-stash" class="nav-tile" onclick="window.switchTab('stash')"><span class="nav-emoji">❄️</span><span class="nav-label">Stash</span></div>
        <div id="tab-appointments" class="nav-tile" onclick="window.switchTab('appointments')"><span class="nav-emoji">📅</span><span class="nav-label">Appts</span></div>
        <div id="tab-milestones" class="nav-tile" onclick="window.switchTab('milestones')"><span class="nav-emoji">🌱</span><span class="nav-label">Grow</span></div>
        <div id="tab-savings" class="nav-tile" onclick="window.switchTab('savings')"><span class="nav-emoji">💰</span><span class="nav-label">Savings</span></div>

    <div id="loading-indicator" class="loading">Syncing Data...</div>

    <main>
        <!-- All pages (same as previous full version) -->
        <!-- I'll include all page HTML here for completeness, but due to length I'll note that you can reuse the page blocks from earlier. -->
        <!-- For brevity in this message, I'll provide the key JavaScript and you can plug in the page HTML from the previous full version. -->
    </main>
</div>

<footer id="fixed-bottom">
    <div class="footer-action" onclick="window.toggleNight()"><span style="font-size: 24px;">🌗</span><span>Night</span></div>
    <div class="footer-action" onclick="window.toggleUnits()"><span style="font-size: 24px;" id="flag-emoji">🇬🇧</span><span id="unit-label">UK Units</span></div>
    <div class="footer-action" onclick="window.logout()"><span style="font-size: 24px;">🚪</span><span>Logout</span></div>
</footer>

<script>
    (function() {
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbzEKZGpKALJl1i8FSTogdk63w48qg7fjGHcYzAtXwHdzcIyxwgATfEE-FyW7UHPiQc6/exec';

        // --- STATE (Pro always true for testing) ---
        let state = {
            units: 'UK',
            tab: 'milk',
            currentChild: 'Child A',
            milkMode: 'Pump',
            milkSide: 'Left',
            nappyType: 'Wee',
            logs: [],
            offlineQueue: JSON.parse(localStorage.getItem('offlineQueue') || '[]'),
            allProducts: [],
            children: [
                { name: 'Child A', color: '#8fbca0' },
                { name: 'Child B', color: '#f4a261' },
                { name: 'Child C', color: '#e76f51' },
                { name: 'Child D', color: '#9b5de5' },
                { name: 'Child E', color: '#00b4d8' }
            ],
            stashBalance: 0
        };

        let privateNotes = JSON.parse(localStorage.getItem('ecoPrivateNotes') || '[]');
        let handoverNotes = JSON.parse(localStorage.getItem('handoverNotes') || '{}');
        let charts = {};
        let timerInterval = null;

        // --- Helpers ---
        function showError(msg) {
            const banner = document.getElementById('error-banner');
            banner.style.display = 'block';
            banner.textContent = '⚠️ ' + msg;
            setTimeout(() => banner.style.display = 'none', 5000);
        }

        function showBanner(text, type) {
            const banner = document.getElementById('sync-banner');
            banner.textContent = text;
            banner.className = `sync-banner banner-${type}`;
            banner.style.display = 'block';
            if (type === 'synced') setTimeout(() => banner.style.display = 'none', 3000);
        }

        // --- Offline queue processing ---
        async function processOfflineQueue() {
            if (!navigator.onLine || state.offlineQueue.length === 0) return;
            showBanner(`Syncing ${state.offlineQueue.length} item(s)...`, 'offline');
            const queue = [...state.offlineQueue];
            for (const item of queue) {
                try {
                    const resp = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(item) });
                    const result = await resp.json();
                    if (result.success) {
                        state.offlineQueue = state.offlineQueue.filter(i => i.timestamp !== item.timestamp);
                        state.logs.push(item);
                    }
                } catch (e) {}
            }
            localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
            if (state.offlineQueue.length === 0) {
                showBanner('All data synced ✓', 'synced');
                renderUI();
            } else {
                showBanner(`${state.offlineQueue.length} items pending`, 'offline');
            }
        }
        window.addEventListener('online', processOfflineQueue);
        setInterval(processOfflineQueue, 30000);

        function saveWithOfflineSupport(payload, btnId, defaultText) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.innerText = "Saving...";
            const attemptSave = async () => {
                try {
                    const resp = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await resp.json();
                    if (result.success) {
                        btn.innerText = "Saved!";
                        state.logs.push(payload);
                        showBanner('Saved to cloud', 'synced');
                        setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
                        return true;
                    }
                } catch (e) {}
                return false;
            };
            if (navigator.onLine) {
                attemptSave().then(success => {
                    if (!success) {
                        state.offlineQueue.push(payload);
                        localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
                        btn.innerText = "Queued";
                        showBanner('Saved offline – will sync later', 'offline');
                        setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
                    }
                });
            } else {
                state.offlineQueue.push(payload);
                localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
                btn.innerText = "Queued";
                showBanner('Saved offline – will sync later', 'offline');
                setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
            }
        }

        // --- Child management ---
        function buildChildSelector() {
            const container = document.getElementById('child-selector-container');
            container.innerHTML = state.children.map((child, idx) => `
                <button class="child-btn ${idx === 0 ? 'active' : ''}" data-child="${child.name}" style="border-color: ${child.color};">👶 ${child.name.slice(-1)}</button>
            `).join('');
            if (!state.currentChild) state.currentChild = state.children[0].name;
            applyChildTheme(state.currentChild);
            document.querySelectorAll('.child-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    window.setChild(e.currentTarget.getAttribute('data-child'));
                });
            });
            document.getElementById('current-child-display').textContent = `👤 ${state.currentChild}`;
            renderHandoverNote();
        }

        window.setChild = (childName) => {
            state.currentChild = childName;
            document.querySelectorAll('.child-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-child') === childName) btn.classList.add('active');
            });
            applyChildTheme(childName);
            document.getElementById('current-child-display').textContent = `👤 ${childName}`;
            renderHandoverNote();
            renderUI();
        };

        function applyChildTheme(childName) {
            const child = state.children.find(c => c.name === childName);
            if (child) {
                document.documentElement.style.setProperty('--accent', child.color);
                document.documentElement.style.setProperty('--accent-dark', adjustColor(child.color, -20));
            }
        }

        function adjustColor(hex, percent) {
            let R = parseInt(hex.substring(1,3),16), G = parseInt(hex.substring(3,5),16), B = parseInt(hex.substring(5,7),16);
            R = Math.max(0, R + percent); G = Math.max(0, G + percent); B = Math.max(0, B + percent);
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }

        function renderHandoverNote() {
            const container = document.getElementById('handover-note-container');
            const note = handoverNotes[state.currentChild] || '';
            container.innerHTML = `<div style="display:flex; justify-content:space-between;"><strong>📝 Handover Note</strong><span onclick="window.editHandoverNote()">✏️</span></div><div>${note || 'No note yet.'}</div>`;
        }

        window.editHandoverNote = () => {
            const newNote = prompt('Enter note:', handoverNotes[state.currentChild] || '');
            if (newNote !== null) { handoverNotes[state.currentChild] = newNote; localStorage.setItem('handoverNotes', JSON.stringify(handoverNotes)); renderHandoverNote(); }
        };

        // --- Data refresh ---
        window.refreshData = async () => {
            if(!window.auth?.currentUser) return;
            document.getElementById('loading-indicator').style.display = 'block';
            try {
                const resp = await fetch(`${GOOGLE_URL}?type=logs&email=${window.auth.currentUser.email}`);
                const data = await resp.json();
                state.logs = Array.isArray(data) ? data : [];
                renderUI();
            } catch (e) { showError('Could not load logs'); }
            finally { document.getElementById('loading-indicator').style.display = 'none'; }
        };

        // --- Save functions ---
        window.saveData = (category) => {
            const isMilk = category === 'Milk';
            const amtInput = document.getElementById(isMilk ? 'milkAmt' : 'formulaAmt');
            let val = parseFloat(amtInput.value);
            if(isNaN(val)) return alert("Enter a valid amount");
            if(state.units === 'US') val = val * 29.5735;
            const detail = isMilk ? `${state.milkMode} (${state.milkSide})` : 'Bottle';
            const timeId = isMilk ? 'milkTime' : 'formulaTime';
            const payload = {
                action: 'save',
                timestamp: new Date(document.getElementById(timeId).value).toISOString(),
                category, value: Math.round(val), detail,
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            amtInput.value = '';
            saveWithOfflineSupport(payload, `btn-save-${category.toLowerCase()}`, `Save ${category} Log`);
            if (category === 'Milk' && state.milkMode === 'Pump') window.adjustStash(1);
            if (category === 'Milk' && state.milkMode === 'Feed') window.adjustStash(-1);
        };

        window.saveNappy = () => {
            const time = new Date(document.getElementById('nappyTime').value).toISOString();
            const payload = { action: 'save', timestamp: time, category: 'Nappy', value: 1, detail: state.nappyType, user: window.auth.currentUser.email, child: state.currentChild };
            saveWithOfflineSupport(payload, 'btn-save-nappy', 'Log Nappy');
        };

        window.saveSkin = () => {
            const start = new Date(document.getElementById('skinStart').value);
            const end = new Date(document.getElementById('skinEnd').value);
            const mins = Math.round((end - start) / 60000);
            if(mins <= 0) return alert("End time must be after start time");
            const payload = { action: 'save', timestamp: start.toISOString(), category: 'SkinToSkin', value: mins, detail: 'Session', user: window.auth.currentUser.email, child: state.currentChild };
            saveWithOfflineSupport(payload, 'btn-save-skin', 'Save Session');
        };

        window.saveMedication = () => {
            const name = document.getElementById('medName').value.trim();
            if (!name) return alert("Enter medication name");
            const dosage = document.getElementById('medDosage').value.trim();
            const time = new Date(document.getElementById('medTime').value).toISOString();
            const payload = { action: 'save', timestamp: time, category: 'Medication', value: 0, detail: `${name}|${dosage}`, user: window.auth.currentUser.email, child: state.currentChild };
            document.getElementById('medName').value = '';
            document.getElementById('medDosage').value = '';
            saveWithOfflineSupport(payload, 'btn-save-med', 'Log Medication');
        };

        window.saveHospitalNote = () => {
            const hospital = document.getElementById('hospitalName').value.trim();
            if (!hospital) return alert("Enter hospital name");
            const notes = document.getElementById('hospitalNotes').value.trim();
            const time = new Date(document.getElementById('hospitalTime').value).toISOString();
            const payload = { action: 'save', timestamp: time, category: 'HospitalNote', value: 0, detail: `${hospital}|${notes}`, user: window.auth.currentUser.email, child: state.currentChild };
            document.getElementById('hospitalName').value = '';
            document.getElementById('hospitalNotes').value = '';
            saveWithOfflineSupport(payload, 'btn-save-hospital', 'Save Note');
        };

        window.deleteEntry = async (timestamp) => {
            if(!confirm('Delete?')) return;
            const payload = { action: 'delete', timestamp, user: window.auth.currentUser.email };
            await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(payload) });
            state.logs = state.logs.filter(l => l.timestamp !== timestamp);
            renderUI();
        };

        // --- Stash ---
        window.adjustStash = async (change) => {

        // --- Render UI (simplified but functional) ---
        const renderUI = () => {
        // ==================== RENDER UI & HELPERS ====================
function formatTimeAgo(ts) {
    const diff = (new Date() - new Date(ts)) / 1000;
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hour${diff>=7200?'s':''} ago`;
    if (diff < 172800) return '1 day ago';
    return '>2 days';
}

function renderMedicationTimers() {
    const container = document.getElementById('med-timers-container');
    if (!container) return;
    const childLogs = state.logs.filter(l => l.child === state.currentChild);
    const medLogs = childLogs.filter(l => l.category === 'Medication').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    const latest = {};
    medLogs.forEach(l => {
        const name = l.detail.split('|')[0].toLowerCase();
        if (!latest[name] || new Date(l.timestamp) > new Date(latest[name].timestamp)) latest[name] = l;
    });
    container.innerHTML = Object.values(latest).map(l => {
        const [name, dosage] = l.detail.split('|');
        return `<div class="med-timer-card"><div class="med-name">${name}</div>${dosage?`<div class="med-dosage">${dosage}</div>`:''}<div class="med-time">⏱️ ${formatTimeAgo(l.timestamp)}</div></div>`;
    }).join('') || '<div style="text-align:center; padding:15px;">No medications logged yet</div>';
}

const groupByDay = (logs, key='value') => {
    const daily = {};
    logs.forEach(l => { const d = new Date(l.timestamp).toLocaleDateString(undefined, {month:'short', day:'numeric'}); daily[d] = (daily[d]||0) + Number(l[key]); });
    return daily;
};

const movingAvg = (obj, days=7) => {
    const dates = Object.keys(obj).sort((a,b) => new Date(a)-new Date(b));
    const vals = dates.map(d => obj[d]);
    const avg = [];
    for (let i=0; i<vals.length; i++) {
        if (i < days-1) avg.push(null);
        else avg.push(vals.slice(i-days+1, i+1).reduce((a,b)=>a+b,0)/days);
    }
    return { dates, movingAvg: avg };
};

const supplyStatus = (pump, feed) => {
    const week = new Date(); week.setDate(week.getDate()-6);
    const f = l => new Date(l.timestamp) >= week;
    const p = pump.filter(f).reduce((s,l)=>s+ +l.value,0);
    const fd = feed.filter(f).reduce((s,l)=>s+ +l.value,0);
    const diff = p - fd;
    const ratio = p ? Math.min(fd/p*100,100) : 0;
    let status, cls, msg;
    if (diff>100) { status='Surplus'; cls='status-surplus'; msg=`👍 Surplus: +${Math.round(diff)}ml`; }
    else if (diff>0) { status='Balanced'; cls='status-balanced'; msg=`✓ Balanced: +${Math.round(diff)}ml`; }
    else if (diff>-50) { status='Slight Deficit'; cls='status-deficit'; msg=`⚠️ Slight Deficit: ${Math.round(diff)}ml`; }
    else { status='Critical Deficit'; cls='status-critical'; msg=`🚨 Critical Deficit: ${Math.round(diff)}ml`; }
    return { pumpTotal:p, feedTotal:fd, diff, ratio, status, statusClass:cls, message:msg };
};

function drawChart(id, datasets, opts={}) {
    try {
        const canvas = document.getElementById(id);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if(charts[id]) charts[id].destroy();
        if(datasets.every(ds=>ds.data.length===0)) {
            charts[id] = new Chart(ctx, { type:'line', data:{labels:['No data yet'],datasets:[]}, options:{plugins:{title:{display:true,text:'Add entries'}}}});
            return;
        }
        charts[id] = new Chart(ctx, {
            type:'line', data:{labels:opts.labels, datasets},
            options:{
                responsive:true, maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                plugins:{
                    tooltip:{callbacks:{label:(ctx)=>{
                        let lbl = ctx.dataset.label+': ';
                        const v = ctx.parsed.y;
                        if(opts.unit==='min') lbl += v+' min';
                        else if(opts.unit==='count') lbl += v;
                        else {
                            const c = state.units==='US' ? (v/29.5735).toFixed(1) : Math.round(v);
                            lbl += c+' '+(state.units==='US'?'oz':'ml');
                        }
                        return lbl;
                    }}},
                    legend:{display:false}
                },
                scales:{y:{beginAtZero:true,grid:{color:'rgba(200,200,200,0.2)'}},x:{grid:{display:false}}}
            }
        });
    } catch(e) {}
}

        }

        const allDates = [...new Set([...Object.keys(pumpDay), ...Object.keys(feedDay)])].sort((a,b)=>new Date(a)-new Date(b));
        drawChart('chart-milk', [
