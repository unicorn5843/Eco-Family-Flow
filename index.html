<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc",
        measurementId: "G-DDCPL98RXR"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-interface').style.display = 'flex';
          loadMilkData(); 
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-interface').style.display = 'none';
        }
      });
      window.login = () => signInWithPopup(auth, provider);
      window.logout = () => signOut(auth);
    </script>
    
    <style>
        :root {
            --bg: #f4f9f4; --card: #ffffff; --text: #2d412d; --accent: #81c784; --nav: #dceddc;
        }
        body.night {
            --bg: #000000; --card: #120000; --text: #ff4444; --accent: #880000; --nav: #1a0000;
        }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        #app-interface { display: none; width: 100%; }
        nav { width: 70px; background: var(--nav); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(0,0,0,0.1); }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 25px; cursor: pointer; padding: 12px; border-radius: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }
        main { flex: 1; padding: 15px; overflow-y: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1); }
        input { background: var(--card); color: var(--text); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(128,128,128,0.2); }
        .del-btn { color: #ff5252; background: none; border: none; font-size: 20px; cursor: pointer; }
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #222; color: #ff4444; border: 1px solid #440000; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
    <h1 style="color:var(--accent)">Eco Family Flow</h1>
    <button onclick="login()" class="save-btn" style="width:200px">Login with Google</button>
</div>

<div id="app-interface">
    <nav>
        <button class="tab-btn active" onclick="showPage('milk', this)">🤱</button>
        <button class="tab-btn" onclick="showPage('formula', this)">🥛</button>
        <button class="tab-btn" onclick="logout()" style="margin-top:auto">🏃</button>
    </nav>
    <main>
        <div id="milk" class="page">
            <h2>Milk Command</h2>
            <div class="card">
                <input type="datetime-local" id="milkTime">
                <input type="number" id="milkAmt" placeholder="Amount (ml)">
                <button class="save-btn" onclick="submitLog('Milk')">Save Log</button>
            </div>
            <div class="card">
                <small><strong>Recent History</strong></small>
                <div id="milk-history">Loading...</div>
            </div>
        </div>
        
        <div id="formula" class="page" style="display:none">
            <h2>Formula Command</h2>
            <div class="card">
                <input type="datetime-local" id="formulaTime">
                <input type="number" id="formulaAmt" placeholder="Amount (ml)">
                <button class="save-btn" onclick="submitLog('Formula')">Save Bottle</button>
            </div>
            <div id="formula-history"></div>
        </div>
    </main>
</div>

<button class="night-toggle" onclick="document.body.classList.toggle('night')">🌙</button>

<script>
    const GOOGLE_URL = 'PASTE_YOUR_NEW_URL_HERE';

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        id === 'milk' ? loadMilkData() : loadFormulaData();
    };

    window.submitLog = async (cat) => {
        const amt = document.getElementById(cat === 'Milk' ? 'milkAmt' : 'formulaAmt').value;
        const time = document.getElementById(cat === 'Milk' ? 'milkTime' : 'formulaTime').value;
        if(!amt) return alert("Enter amount!");

        const payload = { 
            timestamp: time, 
            category: cat, 
            value: amt, 
            detail1: 'Log', 
            user: window.auth.currentUser.email 
        };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Saved!");
            cat === 'Milk' ? loadMilkData() : loadFormulaData();
        } catch (e) { alert("Error saving."); }
    };

    window.loadMilkData = async () => {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const user = window.auth.currentUser.email;
            const filtered = data.filter(r => r.user === user && r.category === 'Milk').reverse();
            
            document.getElementById('milk-history').innerHTML = filtered.map(r => `
                <div class="hist-item">
                    <span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml</span>
                    <button class="del-btn" onclick="deleteLog('${r.timestamp}', 'milk')">✕</button>
                </div>`).join('') || "No logs found.";
        } catch (e) { 
            document.getElementById('milk-history').innerHTML = "⚠️ Load Failed"; 
        }
    };

    window.deleteLog = async (ts, type) => {
        if(!confirm("Delete?")) return;
        await fetch(GOOGLE_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: 'delete', timestamp: ts, user: window.auth.currentUser.email }) 
        });
        type === 'milk' ? loadMilkData() : loadFormulaData();
    };
</script>
</body>
</html>
