<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Log</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; transition: 0.3s; margin: 0; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #059669; color: white; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
        
        /* Night Mode Support */
        body.night { background: #121212; color: #ff4d4d; }
        body.night .card { background: #1e1e1e; color: #ff4d4d; border: 1px solid #333; }
        body.night input, body.night select { background: #2a2a2a; color: #ff4d4d; border: 1px solid #444; }
        body.night button { background: #b91c1c; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0">Milk Log</h2>
        <button onclick="toggleNight()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">Night Mode 👁️</button>
    </div>

    <label>Date & Time</label>
    <input type="datetime-local" id="logTime">

    <label>Amount (ml)</label>
    <input type="number" id="amt" value="80" inputmode="numeric">

    <label>Type</label>
    <select id="typ">
        <option value="Pumped">Pumped</option>
        <option value="Feed">Feed (Bottle)</option>
    </select>

    <label>Side</label>
    <select id="side">
        <option value="Both">Both</option>
        <option value="Left">Left</option>
        <option value="Right">Right</option>
    </select>

    <button id="saveBtn" onclick="saveData()">Save Entry</button>
</div>

<script>
    // Set the default time to "Now" when the page opens
    window.onload = () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('logTime').value = now.toISOString().slice(0, 16);
    };

    function toggleNight() { document.body.classList.toggle('night'); }

    async function saveData() {
    const btn = document.getElementById('saveBtn');
    const amount = document.getElementById('amt').value;
    const type = document.getElementById('typ').value;
    const side = document.getElementById('side').value;
    const logTime = document.getElementById('logTime').value;
    
    const SB_URL = 'https://cqvqteauzipnetntzht.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxdnF1dGVhdXppcG5ldG50emh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjU1MDcsImV4cCI6MjA5MDIwMTUwN30.fSh7b0jH18Jja6YNetfhZDu6TcWUtL0ukzIZ9Wok8VY';

    btn.innerText = "Saving...";
    btn.disabled = true;

    try {
        const response = await fetch(`${SB_URL}/rest/v1/milk_logs`, {
            method: 'POST',
            headers: {
                'apikey': SB_KEY.trim(), // .trim() removes any accidental spaces
                'Authorization': `Bearer ${SB_KEY.trim()}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ 
                amount_ml: parseInt(amount) || 0, 
                type: type,
                side: side,
                created_at: new Date(logTime).toISOString()
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            alert(`🚨 Database Error ${response.status}: ${errorText}`);
        } else {
            alert("✅ Logged successfully!");
        }
    } catch (err) {
        alert("🚨 Connection Error: " + err.message + " (Check if VPN/Adblock is on)");
    } finally {
        btn.innerText = "Save Entry";
        btn.disabled = false;
    }
    }
