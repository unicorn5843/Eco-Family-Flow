<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc",
        measurementId: "G-DDCPL98RXR"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      window.auth = auth;
      window.login = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
      window.logout = () => signOut(auth);

      onAuthStateChanged(auth, (user) => {
        const authScreen = document.getElementById('auth-screen');
        const appInterface = document.getElementById('app-interface');
        if (user) {
          authScreen.style.display = 'none';
          appInterface.style.display = 'flex';
          resetTimeInputs();
          loadMilkData(); // Load default page data
        } else {
          authScreen.style.display = 'flex';
          appInterface.style.display = 'none';
        }
      });

      window.resetTimeInputs = () => {
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          const timeStr = now.toISOString().slice(0, 16);
          if(document.getElementById('feedTime')) document.getElementById('feedTime').value = timeStr;
          if(document.getElementById('formulaTime')) document.getElementById('formulaTime').value = timeStr;
      };
    </script>
    
    <style>
        :root {
            --bg: #f4f9f4; --sidebar: #dceddc; --card: #ffffff;
            --text: #2d412d; --accent: #81c784; --night-bg: #000;
            --night-text: #ff0000; --night-card: #1a0000;
        }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; }
        body.night { background: var(--night-bg); color: var(--night-text); }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app-interface { display: none; width: 100%; height: 100%; }
        nav { width: 75px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #c8d6c8; }
        .tab-btn { background: none; border: none; font-size: 24px; margin-bottom: 25px; cursor: pointer; padding: 12px; border-radius: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }
        main { flex: 1; padding: 15px; overflow-y: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .save-btn { background: #66bb6a; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .side-btn, .type-select { flex:1; padding:10px; border-radius:10px; border:1px solid #ddd; background:white; cursor:pointer; font-size: 13px; }
        .side-btn.active, .type-select.active { background: var(--accent); color:white; border-color: var(--accent); font-weight:bold; }
        .night-toggle { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 100; }
        .hist-item { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; font-size:12px; }
        .del-btn { color: #ff5252; background: none; border: none; font-weight: bold; cursor: pointer; }
        .stat-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px; }
        .stat-card { background:white; padding:10px; border-radius:12px; text-align:center; border-top:4px solid var(--accent); }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color: var(--accent)">Eco Family Flow</h1>
    <button onclick="login()" style="padding: 15px 30px; border-radius: 30px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer;">Sign in with Google</button>
</div>

<div id="app-interface">
    <nav>
        <button class="tab-btn active" onclick="showPage('milk', this)">🤱</button>
        <button class="tab-btn" onclick="showPage('formula', this)">🥛</button>
        <button class="tab-btn" onclick="showPage('nappy', this)">🧷</button>
        <button class="tab-btn" onclick="logout()" style="margin-top: auto;">🏃</button>
    </nav>
    <main>
        <div id="milk" class="page">
            <h2 style="color: var(--accent); margin-top:0;">🤱 Milk Command</h2>
            
            <div class="card">
                <input type="datetime-local" id="feedTime" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button id="mode-pump" class="type-select active" onclick="setMilkMode('Pump')">Pump</button>
                    <button id="mode-feed" class="type-select" onclick="setMilkMode('Feed')">Feed</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button id="sideL" class="side-btn active" onclick="setSide('Left')">Left</button>
                    <button id="sideR" class="side-btn" onclick="setSide('Right')">Right</button>
                    <button id="sideB" class="side-btn" onclick="setSide('Both')">Both</button>
                </div>
                <input type="number" id="milkAmt" placeholder="Amount (ml)" style="font-size: 20px; text-align: center; width: 100%; padding:12px; border-radius:10px; margin-bottom:15px; border:1px solid #eee;">
                <button class="save-btn" id="saveBtn" onclick="submitLog('Milk')">Confirm & Save</button>
            </div>

            <div id="milk-stats-area"></div>

            <div class="card">
                <div style="height: 250px;"><canvas id="milkChart"></canvas></div>
            </div>

            <div class="card">
                <small><strong>Recent Milk History</strong></small>
                <div id="milk-history" style="max-height:120px; overflow-y:auto; margin-top:5px;"></div>
            </div>
        </div>

        <div id="formula" class="page" style="display:none">
            <h2 style="color: #2196f3; margin-top:0;">🥛 Formula Command</h2>
            
            <div class="card">
                <input type="datetime-local" id="formulaTime" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
                <input type="number" id="formulaAmt" placeholder="Bottle Amount (ml)" style="font-size: 20px; text-align: center; width: 100%; padding:12px; border-radius:10px; margin-bottom:15px; border:1px solid #eee;">
                <button class="save-btn" id="formulaSaveBtn" style="background:#2196f3" onclick="submitLog('Formula')">Save Bottle</button>
            </div>

            <div id="formula-stats-area"></div>

            <div class="card">
                <div style="height: 250px;"><canvas id="formulaChart"></canvas></div>
            </div>

            <div class="card">
                <small><strong>Recent Formula History</strong></small>
                <div id="formula-history" style="max-height:120px; overflow-y:auto; margin-top:5px;"></div>
            </div>
        </div>

        <div id="nappy" class="page" style="display:none"><h2 style="color: var(--accent)">🧷 Nappy</h2><div class="card">Coming Soon...</div></div>
    </main>
</div>

<button class="night-toggle" onclick="document.body.classList.toggle('night')">🌙</button>

<script>
    const GOOGLE_URL = 'PASTE_YOUR_NEW_WEB_APP_URL_HERE';
    window.currentMode = 'Pump';
    window.currentSide = 'Left';
    let milkChart = null;
    let formulaChart = null;

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(btn) btn.classList.add('active');
        if(id === 'milk') loadMilkData();
        if(id === 'formula') loadFormulaData();
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
    };

    window.setSide = (s) => {
        window.currentSide = s;
        document.getElementById('sideL').classList.toggle('active', s === 'Left');
        document.getElementById('sideR').classList.toggle('active', s === 'Right');
        document.getElementById('sideB').classList.toggle('active', s === 'Both');
    };

    window.submitLog = async (cat) => {
        const amtId = cat === 'Milk' ? 'milkAmt' : 'formulaAmt';
        const timeId = cat === 'Milk' ? 'feedTime' : 'formulaTime';
        const btnId = cat === 'Milk' ? 'saveBtn' : 'formulaSaveBtn';
        
        const amt = document.getElementById(amtId).value;
        const time = document.getElementById(timeId).value;
        const btn = document.getElementById(btnId);
        const detail = cat === 'Milk' ? `${window.currentMode} (${window.currentSide})` : 'Bottle';

        if(!amt) return alert("Enter amount!");
        btn.innerText = "⌛ Sending...";

        try {
            await fetch(GOOGLE_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ timestamp: time, category: cat, value: amt, detail1: detail, user: window.auth.currentUser.email })
            });
            btn.innerText = "✅ Saved!";
            setTimeout(() => { 
                btn.innerText = cat === 'Milk' ? "Confirm & Save" : "Save Bottle"; 
                document.getElementById(amtId).value = '';
                cat === 'Milk' ? loadMilkData() : loadFormulaData();
            }, 1500);
        } catch (e) { alert("Error!"); btn.innerText = "❌ Error"; }
    };

    window.loadMilkData = async () => {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const user = window.auth.currentUser.email;
            const today = new Date().toLocaleDateString();

            let myMilk = data.filter(r => r.user === user && r.category === 'Milk').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let daily = {}, totals = { pAll: 0, fAll: 0, pToday: 0 };
            myMilk.forEach(r => {
                const dt = new Date(r.timestamp);
                const dStr = dt.toLocaleDateString([], {day:'2-digit', month:'short'});
                const val = parseFloat(r.value) || 0;
                const mode = (r.detail1 || "").toLowerCase();

                if(!daily[dStr]) daily[dStr] = {p:0, f:0};
                if(mode.includes('pump')) {
                    totals.pAll += val; daily[dStr].p += val;
                    if(dt.toLocaleDateString() === today) totals.pToday += val;
                } else { totals.fAll += val; daily[dStr].f += val; }
            });

            const surplus = totals.pAll - totals.fAll;
            document.getElementById('milk-stats-area').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card">Today<br><strong>${totals.pToday}ml</strong></div>
                    <div class="stat-card" style="border-top-color:#fb8c00">Surplus<br><strong>${surplus}ml</strong></div>
                </div>`;

            renderHistory('milk-history', myMilk.slice(-5).reverse());
            renderChart('milkChart', daily, ['#81c784', '#fb8c00'], ['Pumped', 'Fed']);
        } catch(e) { console.error(e); }
    };

    window.loadFormulaData = async () => {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const user = window.auth.currentUser.email;
            const today = new Date().toLocaleDateString();

            let myForm = data.filter(r => r.user === user && r.category === 'Formula').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let daily = {}, tToday = 0;
            myForm.forEach(r => {
                const dt = new Date(r.timestamp);
                const dStr = dt.toLocaleDateString([], {day:'2-digit', month:'short'});
                const val = parseFloat(r.value) || 0;
                daily[dStr] = (daily[dStr] || 0) + val;
                if(dt.toLocaleDateString() === today) tToday += val;
            });

            document.getElementById('formula-stats-area').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card" style="border-top-color:#2196f3; grid-column: span 2;">Today's Formula: <strong>${tToday}ml</strong></div>
                </div>`;

            renderHistory('formula-history', myForm.slice(-5).reverse());
            renderFormulaChart(daily);
        } catch(e) { console.error(e); }
    };

    function renderHistory(id, logs) {
        document.getElementById(id).innerHTML = logs.map(r => `
            <div class="hist-item">
                <span>${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${r.value}ml</span>
                <button class="del-btn" onclick="deleteItem('${r.timestamp}')">✕</button>
            </div>`).join('') || 'None';
    }

    function renderChart(id, daily, colors, labels) {
        const ctx = document.getElementById(id).getContext('2d');
        if(milkChart) milkChart.destroy();
        const days = Object.keys(daily);
        milkChart = new Chart(ctx, {
            type: 'line',
            data: { labels: days, datasets: [
                { label: labels[0], data: days.map(d => daily[d].p), borderColor: colors[0], tension: 0.3 },
                { label: labels[1], data: days.map(d => daily[d].f), borderColor: colors[1], tension: 0.3 }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function renderFormulaChart(daily) {
        const ctx = document.getElementById('formulaChart').getContext('2d');
        if(formulaChart) formulaChart.destroy();
        const days = Object.keys(daily);
        formulaChart = new Chart(ctx, {
            type: 'line',
            data: { labels: days, datasets: [{ label: 'ml', data: days.map(d => daily[d]), borderColor: '#2196f3', backgroundColor: 'rgba(33, 150, 243, 0.1)', fill: true, tension: 0.3 }]},
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.deleteItem = async (ts) => {
        if(!confirm("Delete?")) return;
        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', timestamp: ts, user: window.auth.currentUser.email })});
            alert("Requested. Refreshing...");
            loadMilkData(); loadFormulaData();
        } catch(e) { alert("Fail"); }
    };
</script>
</body>
</html>
