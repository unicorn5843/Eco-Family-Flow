<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
    authDomain: "ecofamilyflow.firebaseapp.com",
    projectId: "ecofamilyflow",
    storageBucket: "ecofamilyflow.firebasestorage.app",
    messagingSenderId: "1013479772757",
    appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc",
    measurementId: "G-DDCPL98RXR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.auth = auth;
  window.login = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-interface').style.display = 'flex';
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      const timeInput = document.getElementById('feedTime');
      if(timeInput) timeInput.value = now.toISOString().slice(0, 16);
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-interface').style.display = 'none';
    }
  });
</script>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    window.currentMode = 'Pump';
    window.currentSide = 'Left';
    let myChart = null;

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
        document.getElementById('amtLabel').innerText = m === 'Pump' ? 'Amount Pumped (ml)' : 'Amount Fed (ml)';
    };

    window.setSide = (s) => {
        window.currentSide = s;
        document.getElementById('sideL').classList.toggle('active', s === 'Left');
        document.getElementById('sideR').classList.toggle('active', s === 'Right');
        document.getElementById('sideB').classList.toggle('active', s === 'Both');
    };

    window.submitMilkLog = async () => {
        const saveBtn = document.getElementById('saveBtn');
        const amt = document.getElementById('milkAmt').value;
        const time = document.getElementById('feedTime').value;
        const userEmail = (window.auth && window.auth.currentUser) ? window.auth.currentUser.email : "Unknown User";

        if(!amt) return alert("Please enter an amount!");
        saveBtn.innerText = "⌛ Sending...";
        
        try {
            await fetch(GOOGLE_URL, {
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({
                    timestamp: time,
                    category: 'Milk',
                    value: amt,
                    detail1: `${window.currentMode} (${window.currentSide})`,
                    user: userEmail
                })
            });
            saveBtn.innerText = "✅ Saved!";
            setTimeout(() => {
                saveBtn.innerText = "Confirm & Save";
                document.getElementById('milkAmt').value = ''; 
            }, 3000);
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    window.loadChartData = async () => {
        const btn = document.querySelector('#scalper button');
        btn.innerText = "⌛ Fetching...";
        try {
            const response = await fetch(GOOGLE_URL);
            const allData = await response.json();
            const userEmail = window.auth.currentUser.email;

            const myMilkData = allData.filter(row => row.user === userEmail && row.category === 'Milk');
            const labels = myMilkData.map(d => new Date(d.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            const values = myMilkData.map(d => parseFloat(d.value));

            const ctx = document.getElementById('milkChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Amount (ml)',
                        data: values,
                        backgroundColor: '#81c784',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
            btn.innerText = "🔄 Refresh My Stats";
        } catch (e) {
            btn.innerText = "❌ Load Failed";
            console.error(e);
        }
    };
</script>
