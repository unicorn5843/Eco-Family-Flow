 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Family Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
        authDomain: "ecofamilyflow.firebaseapp.com",
        projectId: "ecofamilyflow",
        storageBucket: "ecofamilyflow.firebasestorage.app",
        messagingSenderId: "1013479772757",
        appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.auth = auth;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-interface').style.display = 'block';
          window.resetTimeInputs();
          window.refreshData(); 
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-interface').style.display = 'none';
        }
      });

      window.login = () => signInWithPopup(auth, provider);
      window.logout = () => signOut(auth).then(() => location.reload());
    </script>

    <style>
        /* [All CSS remains exactly the same as in the previous full code] */
        /* ... (I'll include the full CSS in the final answer) ... */
        .current-child-badge {
            text-align: center;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="header-title">Eco Family Flow</div>
    <button onclick="window.login()" class="save-btn" style="width: auto; padding: 15px 40px;">Sign in with Google</button>
</div>

<div id="app-interface">
    <div id="sync-banner" class="sync-banner" style="display: none;"></div>
    
    <div class="header-title">Eco Family Flow</div>

    <!-- Child Profile Selector (5 children) -->
    <div class="child-selector">
        <button id="child-a-btn" class="child-btn active" data-child="Child A">👶 A</button>
        <button id="child-b-btn" class="child-btn" data-child="Child B">👶 B</button>
        <button id="child-c-btn" class="child-btn" data-child="Child C">👶 C</button>
        <button id="child-d-btn" class="child-btn" data-child="Child D">👶 D</button>
        <button id="child-e-btn" class="child-btn" data-child="Child E">👶 E</button>
    </div>
    <div id="current-child-display" class="current-child-badge">👤 Child A</div>

    <div id="error-banner" class="error-banner"></div>

    <!-- Navigation Grid and Pages (same as before) -->
    <!-- ... (I'll include all the page HTML) ... -->

    <footer id="fixed-bottom">
        <div class="footer-action" onclick="window.toggleNight()">
            <span style="font-size: 24px;">🌗</span><span>Night</span>
        </div>
        <div class="footer-action" onclick="window.toggleUnits()">
            <span style="font-size: 24px;" id="flag-emoji">🇬🇧</span><span id="unit-label">UK Units</span>
        </div>
        <div class="footer-action" onclick="window.logout()">
            <span style="font-size: 24px;">🚪</span><span>Logout</span>
        </div>
    </footer>
</div>

<script>
    (function() {
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbzEKZGpKALJl1i8FSTogdk63w48qg7fjGHcYzAtXwHdzcIyxwgATfEE-FyW7UHPiQc6/exec';
        const AFFILIATE_JSON_URL = 'affiliate-links.json';

        let state = {
            units: 'UK',
            tab: 'milk',
            currentChild: 'Child A',
            milkMode: 'Pump',
            milkSide: 'Left',
            nappyType: 'Wee',
            logs: [],
            offlineQueue: JSON.parse(localStorage.getItem('offlineQueue') || '[]')
        };

        let charts = {};
        let timerInterval = null;

        // Helper to ensure all logs have a child field (default 'Child A')
        function normalizeLogs(logs) {
            return logs.map(log => {
                if (!log.child) log.child = 'Child A';
                return log;
            });
        }

        // Show sync banner
        function showBanner(text, type) {
            const banner = document.getElementById('sync-banner');
            banner.textContent = text;
            banner.className = `sync-banner banner-${type}`;
            banner.style.display = 'block';
            if (type === 'synced') setTimeout(() => banner.style.display = 'none', 3000);
        }

        // Process offline queue
        async function processOfflineQueue() {
            if (!navigator.onLine) return;
            if (state.offlineQueue.length === 0) return;
            showBanner(`Syncing ${state.offlineQueue.length} item(s)...`, 'offline');
            const queue = [...state.offlineQueue];
            for (const item of queue) {
                try {
                    const response = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(item) });
                    const result = await response.json();
                    if (result.success) {
                        state.offlineQueue = state.offlineQueue.filter(i => i.timestamp !== item.timestamp);
                        state.logs.push(item);
                    }
                } catch (e) {}
            }
            localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
            if (state.offlineQueue.length === 0) {
                showBanner('All data synced ✓', 'synced');
                renderUI();
            } else {
                showBanner(`${state.offlineQueue.length} items pending`, 'offline');
            }
        }

        window.addEventListener('online', processOfflineQueue);
        setInterval(processOfflineQueue, 30000);

        // Save with offline support
        function saveWithOfflineSupport(payload, btnId, defaultText) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.innerText = "Saving...";
            const attemptSave = async () => {
                try {
                    const response = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    if (result.success) {
                        btn.innerText = "Saved!";
                        state.logs.push(payload);
                        showBanner('Saved to cloud', 'synced');
                        setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
                        return true;
                    }
                } catch (e) {}
                return false;
            };

            if (navigator.onLine) {
                attemptSave().then(success => {
                    if (!success) {
                        state.offlineQueue.push(payload);
                        localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
                        btn.innerText = "Queued (offline)";
                        showBanner('Saved offline – will sync later', 'offline');
                        setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
                    }
                });
            } else {
                state.offlineQueue.push(payload);
                localStorage.setItem('offlineQueue', JSON.stringify(state.offlineQueue));
                btn.innerText = "Queued (offline)";
                showBanner('Saved offline – will sync later', 'offline');
                setTimeout(() => { btn.innerText = defaultText; renderUI(); }, 1000);
            }
        }

        // Child switching – FIXED
        window.setChild = (child) => {
            state.currentChild = child;
            // Update active button
            document.querySelectorAll('.child-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-child') === child) {
                    btn.classList.add('active');
                }
            });
            // Update display badge
            document.getElementById('current-child-display').textContent = `👤 ${child}`;
            renderUI();
        };

        // Attach click handlers to child buttons (backup)
        document.querySelectorAll('.child-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const child = e.currentTarget.getAttribute('data-child');
                window.setChild(child);
            });
        });

        // Export data
        window.exportData = () => {
            const childLogs = state.logs.filter(l => l.child === state.currentChild);
            const csvRows = [];
            csvRows.push(['Timestamp', 'Category', 'Value', 'Detail', 'Child'].join(','));
            childLogs.forEach(l => {
                csvRows.push([l.timestamp, l.category, l.value, (l.detail || '').replace(/,/g, ';'), l.child].join(','));
            });
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ecofamilyflow_${state.currentChild.replace(' ', '_')}_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };

        window.resetTimeInputs = () => {
            try {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const t = now.toISOString().slice(0, 16);
                ['milkTime', 'formulaTime', 'skinStart', 'skinEnd', 'nappyTime', 'medTime', 'hospitalTime'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.value = t;
                });
            } catch(e) {}
        };

        window.toggleNight = () => document.body.classList.toggle('night');

        window.toggleUnits = () => {
            state.units = state.units === 'UK' ? 'US' : 'UK';
            document.getElementById('flag-emoji').innerText = state.units === 'UK' ? '🇬🇧' : '🇺🇸';
            document.getElementById('unit-label').innerText = state.units === 'UK' ? 'UK Units' : 'US Units';
            const unitText = state.units === 'UK' ? 'ML' : 'OZ';
            document.querySelectorAll('.unit-display').forEach(el => {
                const base = el.innerText.split(' ')[0];
                el.innerText = `${base} (${unitText})`;
            });
            document.getElementById('milkAmt').placeholder = `Amount (${unitText.toLowerCase()})`;
            document.getElementById('formulaAmt').placeholder = `Amount (${unitText.toLowerCase()})`;
            renderUI();
        };

        window.switchTab = (tabId) => {
            state.tab = tabId;
            document.querySelectorAll('.page, .nav-tile').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${tabId}`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            renderUI();
        };

        window.setParam = (param, value) => {
            state[param] = value;
            const prefix = param.replace(/([A-Z])/g, "-$1").toLowerCase();
            const parent = document.getElementById(`${prefix}-${value.toLowerCase()}`).parentElement;
            parent.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${prefix}-${value.toLowerCase()}`).classList.add('active');
        };

        window.refreshData = async () => {
            if(!window.auth?.currentUser) return;
            document.getElementById('loading-indicator').style.display = 'block';
            try {
                const response = await fetch(GOOGLE_URL);
                const text = await response.text();
                const data = JSON.parse(text);
                if (Array.isArray(data)) {
                    state.logs = normalizeLogs(data.filter(row => row.user === window.auth.currentUser.email));
                } else if (data.error) {
                    showError(data.error);
                    state.logs = [];
                } else {
                    state.logs = [];
                }
                renderUI();
            } catch (error) {
                showError("Could not load data.");
            } finally {
                document.getElementById('loading-indicator').style.display = 'none';
            }
        };

        window.deleteEntry = async (timestamp) => {
            if(!confirm('Delete this entry?')) return;
            const payload = { action: 'delete', timestamp: timestamp, user: window.auth.currentUser.email };
            try {
                const response = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                if (result.success) {
                    state.logs = state.logs.filter(l => l.timestamp !== timestamp);
                    renderUI();
                } else {
                    showError('Delete failed');
                }
            } catch(e) {
                showError('Network error during delete');
            }
        };

        window.saveData = (category) => {
            const isMilk = category === 'Milk';
            const amtInput = document.getElementById(isMilk ? 'milkAmt' : 'formulaAmt');
            let val = parseFloat(amtInput.value);
            if(isNaN(val)) return alert("Please enter a valid amount");
            if(state.units === 'US') val = val * 29.5735;
            const detail = isMilk ? `${state.milkMode} (${state.milkSide})` : 'Bottle';
            const timeId = isMilk ? 'milkTime' : 'formulaTime';
            
            const payload = {
                action: 'save',
                timestamp: new Date(document.getElementById(timeId).value).toISOString(),
                category: category,
                value: Math.round(val),
                detail: detail,
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            amtInput.value = '';
            saveWithOfflineSupport(payload, `btn-save-${category.toLowerCase()}`, `Save ${category} Log`);
        };

        window.saveSkin = () => {
            const start = new Date(document.getElementById('skinStart').value);
            const end = new Date(document.getElementById('skinEnd').value);
            const mins = Math.round((end - start) / 60000);
            if(mins <= 0) return alert("End time must be after start time");
            
            const payload = {
                action: 'save',
                timestamp: start.toISOString(),
                category: 'SkinToSkin',
                value: mins,
                detail: 'Session',
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            saveWithOfflineSupport(payload, 'btn-save-skin', 'Save Session');
            resetTimeInputs();
        };

        window.saveNappy = () => {
            const time = new Date(document.getElementById('nappyTime').value).toISOString();
            const payload = {
                action: 'save',
                timestamp: time,
                category: 'Nappy',
                value: 1,
                detail: state.nappyType,
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            saveWithOfflineSupport(payload, 'btn-save-nappy', 'Log Nappy');
        };

        window.saveMedication = () => {
            const name = document.getElementById('medName').value.trim();
            const dosage = document.getElementById('medDosage').value.trim();
            if (!name) return alert("Please enter medication name");
            const time = new Date(document.getElementById('medTime').value).toISOString();
            const detail = `${name}|${dosage}`;
            
            const payload = {
                action: 'save',
                timestamp: time,
                category: 'Medication',
                value: 0,
                detail: detail,
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            document.getElementById('medName').value = '';
            document.getElementById('medDosage').value = '';
            saveWithOfflineSupport(payload, 'btn-save-med', 'Log Medication');
            resetTimeInputs();
        };

        window.saveHospitalNote = () => {
            const hospital = document.getElementById('hospitalName').value.trim();
            const notes = document.getElementById('hospitalNotes').value.trim();
            if (!hospital) return alert("Please enter hospital name");
            const time = new Date(document.getElementById('hospitalTime').value).toISOString();
            const detail = `${hospital}|${notes}`;
            
            const payload = {
                action: 'save',
                timestamp: time,
                category: 'HospitalNote',
                value: 0,
                detail: detail,
                user: window.auth.currentUser.email,
                child: state.currentChild
            };
            document.getElementById('hospitalName').value = '';
            document.getElementById('hospitalNotes').value = '';
            saveWithOfflineSupport(payload, 'btn-save-hospital', 'Save Note');
            resetTimeInputs();
        };

        function formatTimeAgo(timestamp) {
            const now = new Date();
            const then = new Date(timestamp);
            const diffMs = now - then;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays === 1) return '1 day ago';
            if (diffDays === 2) return '2 days ago';
            return '>2 days';
        }

        function renderMedicationTimers() {
            const container = document.getElementById('med-timers-container');
            if (!container) return;
            const childLogs = state.logs.filter(l => l.child === state.currentChild);
            const medLogs = childLogs.filter(l => l.category === 'Medication').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            const latestByMed = {};
            medLogs.forEach(log => {
                const parts = log.detail.split('|');
                const medName = parts[0].toLowerCase();
                if (!latestByMed[medName] || new Date(log.timestamp) > new Date(latestByMed[medName].timestamp)) {
                    latestByMed[medName] = log;
                }
            });
            const timersHtml = Object.values(latestByMed).map(log => {
                const parts = log.detail.split('|');
                const medName = parts[0];
                const dosage = parts[1] || '';
                const timeAgo = formatTimeAgo(log.timestamp);
                return `<div class="med-timer-card"><div class="med-name">${medName}</div>${dosage ? `<div class="med-dosage">${dosage}</div>` : ''}<div class="med-time">⏱️ ${timeAgo}</div></div>`;
            }).join('');
            container.innerHTML = timersHtml || '<div style="text-align:center; padding:15px; opacity:0.6;">No medications logged yet</div>';
        }

        function showError(msg) {
            const banner = document.getElementById('error-banner');
            banner.style.display = 'block';
            banner.textContent = '⚠️ ' + msg;
            setTimeout(() => banner.style.display = 'none', 5000);
        }

        const groupByDay = (logs, valueKey = 'value') => {
            const daily = {};
            logs.forEach(log => {
                const d = new Date(log.timestamp);
                const dateKey = d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
                daily[dateKey] = (daily[dateKey] || 0) + Number(log[valueKey]);
            });
            return daily;
        };

        const calculateMovingAverage = (dailyObj, days = 7) => {
            const sortedDates = Object.keys(dailyObj).sort((a,b) => new Date(a) - new Date(b));
            const values = sortedDates.map(d => dailyObj[d]);
            const movingAvg = [];
            for (let i = 0; i < values.length; i++) {
                if (i < days - 1) movingAvg.push(null);
                else {
                    const sum = values.slice(i - days + 1, i + 1).reduce((a,b) => a + b, 0);
                    movingAvg.push(sum / days);
                }
            }
            return { dates: sortedDates, movingAvg };
        };

        const calculateSupplyStatus = (pumpLogs, feedLogs) => {
            const today = new Date();
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 6);
            const filterLast7Days = (log) => new Date(log.timestamp) >= sevenDaysAgo;
            const recentPump = pumpLogs.filter(filterLast7Days);
            const recentFeed = feedLogs.filter(filterLast7Days);
            const pumpTotal = recentPump.reduce((s, l) => s + Number(l.value), 0);
            const feedTotal = recentFeed.reduce((s, l) => s + Number(l.value), 0);
            const difference = pumpTotal - feedTotal;
            const ratio = pumpTotal > 0 ? Math.min((feedTotal / pumpTotal) * 100, 100) : 0;
            let status, statusClass, message;
            if (difference > 100) { status = 'Surplus'; statusClass = 'status-surplus'; message = `👍 Surplus: +${Math.round(difference)}ml`; }
            else if (difference > 0) { status = 'Balanced'; statusClass = 'status-balanced'; message = `✓ Balanced: +${Math.round(difference)}ml`; }
            else if (difference > -50) { status = 'Slight Deficit'; statusClass = 'status-deficit'; message = `⚠️ Slight Deficit: ${Math.round(difference)}ml`; }
            else { status = 'Critical Deficit'; statusClass = 'status-critical'; message = `🚨 Critical Deficit: ${Math.round(difference)}ml`; }
            return { pumpTotal, feedTotal, difference, ratio, status, statusClass, message };
        };

        const drawChart = (canvasId, datasets, options = {}) => {
            try {
                const canvas = document.getElementById(canvasId);
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                if(charts[canvasId]) charts[canvasId].destroy();
                if(datasets.every(ds => ds.data.length === 0)) {
                    charts[canvasId] = new Chart(ctx, { type: 'line', data: { labels: ['No data yet'], datasets: [] }, options: { plugins: { title: { display: true, text: 'Add entries to see chart' } } } });
                    return;
                }
                charts[canvasId] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: options.labels, datasets: datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            tooltip: { callbacks: { label: (context) => {
                                let label = context.dataset.label || ''; if (label) label += ': ';
                                const val = context.parsed.y;
                                if (val !== null) {
                                    if (options.unit === 'min') label += val + ' min';
                                    else if (options.unit === 'count') label += val;
                                    else {
                                        const converted = state.units === 'US' ? (val / 29.5735).toFixed(1) : Math.round(val);
                                        label += converted + ' ' + (state.units === 'US' ? 'oz' : 'ml');
                                    }
                                }
                                return label;
                            }}},
                            legend: { display: false }
                        },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(200,200,200,0.2)' } }, x: { grid: { display: false } } }
                    }
                });
            } catch(e) {}
        };

        const renderUI = () => {
            try {
                const childLogs = state.logs.filter(l => l.child === state.currentChild);
                const isUS = state.units === 'US';
                const convert = (ml) => isUS ? (ml / 29.5735).toFixed(1) : Math.round(ml);
                const unit = isUS ? 'oz' : 'ml';

                const milkLogs = childLogs.filter(l => l.category === 'Milk');
                const formulaLogs = childLogs.filter(l => l.category === 'Formula');
                const skinLogs = childLogs.filter(l => l.category === 'SkinToSkin');
                const nappyLogs = childLogs.filter(l => l.category === 'Nappy');
                const medLogs = childLogs.filter(l => l.category === 'Medication');
                const hospitalLogs = childLogs.filter(l => l.category === 'HospitalNote');
                
                const pumpLogs = milkLogs.filter(l => l.detail.includes('Pump'));
                const feedMilkLogs = milkLogs.filter(l => l.detail.includes('Feed'));
                const allFeedLogs = childLogs.filter(l => (l.category === 'Milk' && l.detail.includes('Feed')) || l.category === 'Formula');

                // Supply Status (Milk page)
                const supplyContent = document.getElementById('supply-status-content');
                if (supplyContent) {
                    const status = calculateSupplyStatus(pumpLogs, allFeedLogs);
                    supplyContent.innerHTML = `
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                            <div><strong>Pumped:</strong> ${convert(status.pumpTotal)}${unit}</div>
                            <div><strong>Fed:</strong> ${convert(status.feedTotal)}${unit}</div>
                        </div>
                        <div class="supply-indicator">
                            <span>${Math.round(status.ratio)}% used</span>
                            <div class="supply-bar"><div class="supply-bar-fill" style="width: ${status.ratio}%;"></div></div>
                            <span class="supply-status ${status.statusClass}">${status.status}</span>
                        </div>
                        <div style="margin-top: 10px; font-size: 14px; text-align: center; font-weight: bold;">${status.message} ${status.difference < 0 ? '📉' : '📈'}</div>
                    `;
                }

                const renderSection = (logs, containerPrefix, valueFormatter) => {
                    const total = logs.reduce((s, l) => s + Number(l.value), 0);
                    const statsEl = document.getElementById(`stats-${containerPrefix}`);
                    if (statsEl) {
                        statsEl.innerHTML = `
                            <div class="stat-box"><div class="stat-val">${valueFormatter(total)}</div><div class="stat-lbl">Total</div></div>
                            <div class="stat-box"><div class="stat-val">${logs.length}</div><div class="stat-lbl">Entries</div></div>
                        `;
                    }
                    const historyEl = document.getElementById(`history-${containerPrefix}`);
                    if (historyEl) {
                        const sorted = [...logs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                        historyEl.innerHTML = sorted.slice(0,5).map(l => `
                            <div class="history-item">
                                <span>${new Date(l.timestamp).toLocaleString()} - ${l.detail || ''} (${valueFormatter(l.value)})</span>
                                <span class="delete-btn" onclick="window.deleteEntry('${l.timestamp}')">🗑️</span>
                            </div>
                        `).join('');
                    }
                };

                // Milk
                const milkTotalPump = pumpLogs.reduce((s,l) => s + Number(l.value), 0);
                const milkTotalFeed = feedMilkLogs.reduce((s,l) => s + Number(l.value), 0);
                const milkStatsEl = document.getElementById('stats-milk');
                if (milkStatsEl) milkStatsEl.innerHTML = `
                    <div class="stat-box"><div class="stat-val">${convert(milkTotalPump)}${unit}</div><div class="stat-lbl">Pumped</div></div>
                    <div class="stat-box"><div class="stat-val">${convert(milkTotalFeed)}${unit}</div><div class="stat-lbl">Fed (Milk)</div></div>
                `;
                const milkHistoryEl = document.getElementById('history-milk');
                if (milkHistoryEl) {
                    const sorted = [...milkLogs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    milkHistoryEl.innerHTML = sorted.slice(0,5).map(l => `
                        <div class="history-item">
                            <span>${new Date(l.timestamp).toLocaleString()} - ${l.detail || ''} (${convert(l.value)}${unit})</span>
                            <span class="delete-btn" onclick="window.deleteEntry('${l.timestamp}')">🗑️</span>
                        </div>
                    `).join('');
                }
                const pumpDaily = groupByDay(pumpLogs);
                const feedDaily = groupByDay(feedMilkLogs);
                const allDates = [...new Set([...Object.keys(pumpDaily), ...Object.keys(feedDaily)])].sort((a,b) => new Date(a) - new Date(b));
                drawChart('chart-milk', [
                    { label: 'Pumped', data: allDates.map(d => pumpDaily[d] || 0), borderColor: '#4caf50', backgroundColor: '#4caf5020', borderWidth: 2, tension: 0.3, fill: false },
                    { label: 'Fed (Milk)', data: allDates.map(d => feedDaily[d] || 0), borderColor: '#f44336', backgroundColor: '#f4433620', borderWidth: 2, tension: 0.3, fill: false }
                ], { labels: allDates, unit: 'ml' });

                // Formula
                renderSection(formulaLogs, 'formula', (v) => `${convert(v)}${unit}`);
                const formulaDaily = groupByDay(formulaLogs);
                const { dates: fDates, movingAvg: fMA } = calculateMovingAverage(formulaDaily);
                drawChart('chart-formula', [
                    { label: 'Daily Total', data: fDates.map(d => formulaDaily[d]), borderColor: '#6a9c7d', backgroundColor: '#6a9c7d20', borderWidth: 2, tension: 0.3, fill: false },
                    { label: '7-Day Avg', data: fMA, borderColor: '#ff9800', borderWidth: 3, borderDash: [5,5], pointRadius: 0, tension: 0.4, fill: false }
                ], { labels: fDates, unit: 'ml' });

                // Skin
                const formatTime = (mins) => mins >= 60 ? `${(mins/60).toFixed(1)}h` : `${mins} min`;
                renderSection(skinLogs, 'skin', formatTime);
                const skinDaily = groupByDay(skinLogs);
                const { dates: sDates, movingAvg: sMA } = calculateMovingAverage(skinDaily);
                drawChart('chart-skin', [
                    { label: 'Daily Minutes', data: sDates.map(d => skinDaily[d]), borderColor: '#b30000', backgroundColor: '#b3000020', borderWidth: 2, tension: 0.3, fill: false },
                    { label: '7-Day Avg', data: sMA, borderColor: '#ff9800', borderWidth: 3, borderDash: [5,5], pointRadius: 0, tension: 0.4, fill: false }
                ], { labels: sDates, unit: 'min' });

                // Nappy
                renderSection(nappyLogs, 'nappy', (v) => v);
                const nappyDaily = groupByDay(nappyLogs);
                const { dates: nDates, movingAvg: nMA } = calculateMovingAverage(nappyDaily);
                drawChart('chart-nappy', [
                    { label: 'Daily Count', data: nDates.map(d => nappyDaily[d]), borderColor: '#ffb347', backgroundColor: '#ffb34720', borderWidth: 2, tension: 0.3, fill: false },
                    { label: '7-Day Avg', data: nMA, borderColor: '#ff9800', borderWidth: 3, borderDash: [5,5], pointRadius: 0, tension: 0.4, fill: false }
                ], { labels: nDates, unit: 'count' });

                // Stats page (combined feed)
                const totalFed = allFeedLogs.reduce((s,l) => s + Number(l.value), 0);
                const statsStatsEl = document.getElementById('stats-stats');
                if (statsStatsEl) statsStatsEl.innerHTML = `
                    <div class="stat-box"><div class="stat-val">${convert(totalFed)}${unit}</div><div class="stat-lbl">Total Fed</div></div>
                    <div class="stat-box"><div class="stat-val">${allFeedLogs.length}</div><div class="stat-lbl">Feeds</div></div>
                `;
                const combinedDaily = groupByDay(allFeedLogs);
                const { dates: cDates, movingAvg: cMA } = calculateMovingAverage(combinedDaily);
                drawChart('chart-stats', [
                    { label: 'Daily Total', data: cDates.map(d => combinedDaily[d]), borderColor: '#4a90e2', backgroundColor: '#4a90e220', borderWidth: 2, tension: 0.3, fill: false },
                    { label: '7-Day Avg', data: cMA, borderColor: '#ff9800', borderWidth: 3, borderDash: [5,5], pointRadius: 0, tension: 0.4, fill: false }
                ], { labels: cDates, unit: 'ml' });

                // Meds timers
                renderMedicationTimers();
                const medHistoryEl = document.getElementById('history-meds');
                if (medHistoryEl) {
                    const sortedMeds = [...medLogs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    medHistoryEl.innerHTML = sortedMeds.slice(0,5).map(l => {
                        const parts = l.detail.split('|');
                        const medName = parts[0];
                        const dosage = parts[1] || '';
                        return `<div class="history-item"><span>${new Date(l.timestamp).toLocaleString()} - ${medName} ${dosage ? '('+dosage+')' : ''}</span><span class="delete-btn" onclick="window.deleteEntry('${l.timestamp}')">🗑️</span></div>`;
                    }).join('');
                }

                // Hospital notes
                const hospHistoryEl = document.getElementById('history-hospital');
                if (hospHistoryEl) {
                    const sortedHosp = [...hospitalLogs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    hospHistoryEl.innerHTML = sortedHosp.slice(0,10).map(l => {
                        const parts = l.detail.split('|');
                        const hospName = parts[0];
                        const notes = parts[1] || '';
                        return `<div class="hospital-note-item"><div class="hospital-name">🏥 ${hospName}</div><div class="hospital-note-text">${notes.replace(/\n/g, '<br>')}</div><div class="hospital-timestamp">${new Date(l.timestamp).toLocaleString()}</div><div style="text-align:right; margin-top:5px;"><span class="delete-btn" onclick="window.deleteEntry('${l.timestamp}')">🗑️</span></div></div>`;
                    }).join('');
                }

                // Shop page
                if (state.tab === 'shop') {
                    fetch(AFFILIATE_JSON_URL).then(r => r.json()).then(data => {
                        const container = document.getElementById('shop-content');
                        container.innerHTML = data.categories.map(cat => `
                            <div class="shop-category"><h3>${cat.icon} ${cat.name}</h3>${cat.items.map(item => `<a class="shop-item" href="${item.url}" target="_blank" rel="nofollow">${item.name}</a>`).join('')}</div>
                        `).join('');
                    }).catch(() => document.getElementById('shop-content').innerHTML = '<p>Unable to load shop links.</p>');
                }

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(renderMedicationTimers, 60000);
            } catch(e) {
                showError('Display error: ' + e.message);
            }
        };

        window.renderUI = renderUI;
        window.resetTimeInputs();
    })();
</script>
</body>
</html>
