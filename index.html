<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Family Flow | Pro</title>
                        
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXUhOImF9j322cMQ9AQ8CkZXfj0gvMalo",
    authDomain: "ecofamilyflow.firebaseapp.com",
    projectId: "ecofamilyflow",
    storageBucket: "ecofamilyflow.firebasestorage.app",
    messagingSenderId: "1013479772757",
    appId: "1:1013479772757:web:7b2f33869b5ebc08e4badc",
    measurementId: "G-DDCPL98RXR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // EXPOSE AUTH GLOBALLY
  window.auth = auth;

  window.login = () => {
    signInWithPopup(auth, provider).catch((error) => alert(error.message));
  };

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    const authScreen = document.getElementById('auth-screen');
    const appInterface = document.getElementById('app-interface');
    if (user) {
      authScreen.style.display = 'none';
      appInterface.style.display = 'flex';
      // Set default time when logged in
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      const timeInput = document.getElementById('feedTime');
      if(timeInput) timeInput.value = now.toISOString().slice(0, 16);
    } else {
      authScreen.style.display = 'flex';
      appInterface.style.display = 'none';
    }
  });
</script>

<script>
    // THE "ENGINE" - Use 'window' to ensure buttons can see these functions
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxWaFBab4zjl5xLmmWeXu0wLE7V0a7p-K3_d__J64RhEivaAQdhZgyPvQhbLGn_D20F/exec';
    
    window.currentMode = 'Pump';
    window.currentSide = 'Left';

    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    };

    window.setMilkMode = (m) => {
        window.currentMode = m;
        document.getElementById('mode-pump').classList.toggle('active', m === 'Pump');
        document.getElementById('mode-feed').classList.toggle('active', m === 'Feed');
        document.getElementById('amtLabel').innerText = m === 'Pump' ? 'Amount Pumped (ml)' : 'Amount Fed (ml)';
    };

    window.setSide = (s) => {
        window.currentSide = s;
        document.getElementById('sideL').classList.toggle('active', s === 'Left');
        document.getElementById('sideR').classList.toggle('active', s === 'Right');
        document.getElementById('sideB').classList.toggle('active', s === 'Both');
    };

    window.submitMilkLog = async () => {
        const saveBtn = document.getElementById('saveBtn');
        const amt = document.getElementById('milkAmt').value;
        const time = document.getElementById('feedTime').value;
        
        // GRAB THE REAL USER EMAIL
        const userEmail = (window.auth && window.auth.currentUser) ? window.auth.currentUser.email : "Unknown User";

        if(!amt) {
            alert("Please enter an amount!");
            return;
        }

        saveBtn.innerText = "⌛ Sending...";
        saveBtn.style.background = "#fb8c00"; 

        try {
            await fetch(GOOGLE_URL, {
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({
                    timestamp: time,
                    category: 'Milk',
                    value: amt,
                    detail1: `${window.currentMode} (${window.currentSide})`,
                    user: userEmail
                })
            });

            saveBtn.innerText = "✅ Saved!";
            saveBtn.style.background = "#45a049"; 

            setTimeout(() => {
                saveBtn.innerText = "Confirm & Save";
                saveBtn.style.background = "#66bb6a";
                document.getElementById('milkAmt').value = ''; 
            }, 3000);

        } catch (e) {
            saveBtn.innerText = "❌ Error";
            alert("Check internet/connection: " + e.message);
        }
    };
</script>
